<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Gesture Ritual — Live Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#ebe3d4; --mute:#7a746a; --gold:#e4c070; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:Inter,system-ui,sans-serif; background:#040304; color:var(--ink);
    min-height:100dvh; display:flex; flex-direction:column; align-items:center;
    padding:max(10px, env(safe-area-inset-top)) 0 max(10px, env(safe-area-inset-bottom));
  }
  .header { text-align:center; padding:0 16px 6px; }
  h1 { font-family:"Cormorant Garamond",serif; font-weight:600; font-size:clamp(22px,5vw,30px); }
  .tag { color:var(--mute); font-size:11px; margin-top:3px; letter-spacing:.04em; }
  .stage {
    position:relative; flex:1; width:100%; max-width:500px;
    min-height:min(80dvh, 820px); margin-top:6px;
    overflow:hidden; background:#020202;
    box-shadow:0 0 0 1px rgba(255,255,255,.04), 0 40px 100px rgba(0,0,0,.9);
  }
  #video { position:fixed; width:1px; height:1px; opacity:0; pointer-events:none; left:-9999px; }
  .font-cam {
    position:absolute; inset:0; width:100%; height:100%;
  }
  /* LED ring — Riley spec: warm white halo behind brass, 15–20mm float */
  .led-ring {
    position:absolute; left:50%; top:42%; width:78%; aspect-ratio:1;
    transform:translate(-50%,-50%); border-radius:50%; pointer-events:none;
    z-index:2;
    box-shadow:
      0 0 40px 8px rgba(255,210,140,.12),
      0 0 80px 20px rgba(255,190,100,.08),
      inset 0 0 30px 4px rgba(255,220,160,.06);
    border:3px solid rgba(255,225,180,.0);
    transition:box-shadow .8s ease, border-color .8s ease, opacity .8s ease;
    animation:ledRest 5.5s ease-in-out infinite;
  }
  .led-ring.on {
    border-color:rgba(255,235,200,.35);
    box-shadow:
      0 0 50px 12px rgba(255,215,150,.28),
      0 0 100px 28px rgba(255,195,110,.18),
      0 0 160px 40px rgba(255,180,90,.08),
      inset 0 0 40px 8px rgba(255,230,180,.12);
  }
  .led-ring.miracle {
    animation:ledMiracle 4.5s ease-in-out forwards;
    border-color:rgba(255,245,220,.7);
  }
  @keyframes ledRest {
    0%,100% {
      box-shadow:0 0 35px 6px rgba(255,210,140,.1), 0 0 70px 16px rgba(255,190,100,.06);
      opacity:.85;
    }
    50% {
      box-shadow:0 0 55px 14px rgba(255,220,160,.22), 0 0 110px 30px rgba(255,200,120,.12);
      opacity:1;
    }
  }
  @keyframes ledMiracle {
    0%   { box-shadow:0 0 40px 8px rgba(255,210,140,.15); opacity:.5; }
    20%  { box-shadow:0 0 80px 24px rgba(255,235,200,.55), 0 0 140px 50px rgba(255,210,150,.35); opacity:1; }
    45%  { box-shadow:0 0 100px 32px rgba(255,245,230,.75), 0 0 180px 60px rgba(255,220,170,.45); opacity:1; }
    100% { box-shadow:0 0 50px 14px rgba(255,210,140,.25), 0 0 90px 24px rgba(255,190,100,.15); opacity:.7; }
  }
  .led-diffuse {
    position:absolute; left:50%; top:42%; width:90%; aspect-ratio:1;
    transform:translate(-50%,-50%); border-radius:50%; pointer-events:none; z-index:1;
    background:radial-gradient(circle, rgba(255,220,160,.2) 0%, rgba(255,190,110,.06) 45%, transparent 68%);
    filter:blur(28px);
    animation:ledRest 5.5s ease-in-out infinite;
  }
  .font-svg {
    position:absolute; left:50%; top:42%; width:72%; transform:translate(-50%,-50%);
    z-index:4; filter:drop-shadow(0 16px 40px rgba(0,0,0,.8));
  }
  .cross-arm { transition:opacity .4s ease, filter .4s ease; opacity:.35; }
  .cross-arm.lit { opacity:1; filter:url(#crossGlow); }
  .cross-arm.flash { animation:crossPulse .6s ease-out; }
  @keyframes crossPulse {
    0%   { filter:none; }
    40%  { filter:url(#crossBurst); }
    100% { filter:url(#crossGlow); }
  }
  .vignette {
    position:absolute; inset:0; z-index:8; pointer-events:none;
    background:radial-gradient(ellipse 75% 65% at 50% 42%, transparent 20%, rgba(0,0,0,.7) 100%);
  }
  .scanline {
    position:absolute; inset:0; z-index:9; pointer-events:none; opacity:.03;
    background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.4) 2px, rgba(0,0,0,.4) 4px);
  }
  #miracleWord {
    position:absolute; left:0; right:0; top:7%; z-index:10; text-align:center;
    pointer-events:none; opacity:0;
    font-family:"Cormorant Garamond",serif;
    font-size:clamp(36px,10vw,58px); font-weight:600; color:#faf4e8;
    text-shadow:0 0 50px rgba(255,210,140,.7);
    transition:opacity .7s ease .5s;
  }
  #miracleWord.show { opacity:1; }
  .cover {
    position:absolute; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    padding:0 20px max(32px, env(safe-area-inset-bottom));
    background:linear-gradient(180deg, rgba(0,0,0,.15) 0%, rgba(0,0,0,.9) 100%);
    text-align:center;
  }
  .cover.hidden { display:none; }
  .cover p { color:var(--mute); font-size:12px; max-width:300px; line-height:1.55; margin-bottom:14px; }
  .btn {
    font:500 10px Inter,sans-serif; letter-spacing:.12em; text-transform:uppercase;
    background:var(--gold); color:#100c06; border:none; padding:12px 26px; cursor:pointer;
  }
  .btn.ghost { background:transparent; color:var(--gold); border:1px solid rgba(228,192,112,.3); font-size:10px; padding:10px 18px; }
  .spinner {
    width:20px; height:20px; border:2px solid rgba(228,192,112,.2); border-top-color:var(--gold);
    border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 8px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .portrait {
    position:absolute; inset:0; z-index:21; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.92); opacity:0; pointer-events:none; transition:opacity .5s;
  }
  .portrait.show { opacity:1; pointer-events:auto; }
  .polaroid { background:#e8e2d6; padding:6px 6px 28px; width:min(52%,180px); box-shadow:0 12px 36px rgba(0,0,0,.8); }
  .polaroid canvas { width:100%; display:block; filter:sepia(.12) contrast(1.05); }
  .polaroid .cap { font-family:"Cormorant Garamond",serif; font-size:15px; text-align:center; margin-top:6px; color:#2a2218; }
  .portrait .again { position:absolute; bottom:max(18px, env(safe-area-inset-bottom)); }
</style>
</head>
<body>
  <header class="header">
    <h1>Holy Font — Camera View</h1>
    <p class="tag">Fixed lens · gesture engine · LED halo prototype</p>
  </header>

  <div class="stage">
    <video id="video" playsinline muted></video>

    <!-- What the pinhole camera sees — not the guest -->
    <div class="font-cam">
      <svg width="100%" height="100%" viewBox="0 0 400 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="night" cx="50%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#1a1520"/><stop offset="60%" stop-color="#080608"/><stop offset="100%" stop-color="#020202"/>
          </radialGradient>
          <radialGradient id="vineShade" cx="80%" cy="90%" r="50%">
            <stop offset="0%" stop-color="rgba(20,40,18,.5)"/><stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <linearGradient id="brass" x1="25%" y1="10%" x2="75%" y2="95%">
            <stop offset="0%" stop-color="#f5e4b8"/><stop offset="25%" stop-color="#d4aa58"/>
            <stop offset="60%" stop-color="#8a6838"/><stop offset="100%" stop-color="#3a2814"/>
          </linearGradient>
          <linearGradient id="goldEngrave" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fffef5"/><stop offset="45%" stop-color="#f0d080"/>
            <stop offset="100%" stop-color="#c08830"/>
          </linearGradient>
          <linearGradient id="dimEngrave" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1e1610"/><stop offset="100%" stop-color="#0a0806"/>
          </linearGradient>
          <radialGradient id="bowlDeep" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#080604"/><stop offset="100%" stop-color="#4a3820"/>
          </radialGradient>
          <filter id="crossGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="b"/>
            <feFlood flood-color="#ffe8a8" flood-opacity=".95" result="c"/>
            <feComposite in="c" in2="b" operator="in" result="g"/>
            <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="crossBurst" x="-120%" y="-120%" width="340%" height="340%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b"/>
            <feFlood flood-color="#fff8e0" flood-opacity="1" result="c"/>
            <feComposite in="c" in2="b" operator="in" result="g"/>
            <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <rect width="400" height="700" fill="url(#night)"/>
        <rect width="400" height="700" fill="url(#vineShade)"/>
        <!-- Rose-window bokeh hints -->
        <circle cx="200" cy="80" r="60" fill="rgba(80,60,100,.08)"/>
        <circle cx="180" cy="100" r="25" fill="rgba(120,90,140,.05)"/>
        <!-- Vines (camera sees creeping foliage beside font) -->
        <path d="M340 700 Q360 500 320 400 Q300 320 340 250" fill="none" stroke="rgba(30,50,22,.6)" stroke-width="8" stroke-linecap="round"/>
        <path d="M60 700 Q40 520 80 420 Q100 340 55 280" fill="none" stroke="rgba(30,50,22,.5)" stroke-width="6" stroke-linecap="round"/>
        <ellipse cx="330" cy="380" rx="18" ry="10" fill="rgba(40,70,30,.5)" transform="rotate(-30 330 380)"/>
        <ellipse cx="70" cy="350" rx="14" ry="8" fill="rgba(40,70,30,.4)" transform="rotate(20 70 350)"/>
      </svg>

      <div class="led-diffuse" id="ledDiffuse"></div>
      <div class="led-ring" id="ledRing"></div>

      <svg class="font-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="b2" x1="20%" y1="5%" x2="80%" y2="95%">
            <stop offset="0%" stop-color="#f8ecc8"/><stop offset="30%" stop-color="#d4a858"/>
            <stop offset="70%" stop-color="#7a5830"/><stop offset="100%" stop-color="#2a1c0c"/>
          </linearGradient>
          <linearGradient id="goldEngrave" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fffef5"/><stop offset="45%" stop-color="#f0d080"/>
            <stop offset="100%" stop-color="#c08830"/>
          </linearGradient>
          <linearGradient id="dimEngrave" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1e1610"/><stop offset="100%" stop-color="#0a0806"/>
          </linearGradient>
          <radialGradient id="bowlDeep" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#080604"/><stop offset="100%" stop-color="#4a3820"/>
          </radialGradient>
          <filter id="crossGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="b"/>
            <feFlood flood-color="#ffe8a8" flood-opacity=".95" result="c"/>
            <feComposite in="c" in2="b" operator="in" result="g"/>
            <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="crossBurst" x="-120%" y="-120%" width="340%" height="340%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b"/>
            <feFlood flood-color="#fff8e0" flood-opacity="1" result="c"/>
            <feComposite in="c" in2="b" operator="in" result="g"/>
            <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Brass backplate -->
        <circle cx="200" cy="200" r="155" fill="#0a0806" opacity=".6"/>
        <circle cx="200" cy="200" r="148" fill="url(#b2)" stroke="rgba(255,230,190,.15)" stroke-width="2"/>
        <ellipse cx="165" cy="165" rx="55" ry="40" fill="rgba(255,250,235,.15)" transform="rotate(-18 165 165)"/>
        <circle cx="200" cy="200" r="130" fill="none" stroke="rgba(0,0,0,.15)" stroke-width="1"/>
        <!-- Ornate cross — carved patée with flared terminals -->
        <g id="crossGroove" fill="url(#dimEngrave)" opacity=".85">
          <path d="M188 200 L188 118 Q188 78 200 62 Q212 78 212 118 L212 200
                   M188 200 L188 278 Q188 318 200 334 Q212 318 212 278 L212 200
                   M200 188 L118 188 Q78 200 62 200 Q78 212 118 212 L200 212
                   M200 188 L282 188 Q322 200 338 200 Q322 212 282 212 L200 212 Z"/>
        </g>
        <path id="segHeaven" class="cross-arm" fill="url(#dimEngrave)"
          d="M189 200 L189 120 Q189 80 200 64 Q211 80 211 120 L211 200
             M192 200 L192 125 Q192 92 200 78 Q208 92 208 125 L208 200 Z"/>
        <path id="segEarth" class="cross-arm" fill="url(#dimEngrave)"
          d="M189 200 L189 278 Q189 318 200 334 Q211 318 211 278 L211 200
             M192 200 L192 273 Q192 306 200 320 Q208 306 208 273 L208 200 Z"/>
        <path id="segLeft" class="cross-arm" fill="url(#dimEngrave)"
          d="M200 189 L120 189 Q82 200 66 200 Q82 211 120 211 L200 211
             M200 192 L125 192 Q90 200 76 200 Q90 208 125 208 L200 208 Z"/>
        <path id="segRight" class="cross-arm" fill="url(#dimEngrave)"
          d="M200 189 L280 189 Q318 200 334 200 Q318 211 280 211 L200 211
             M200 192 L275 192 Q310 200 324 200 Q310 208 275 208 L200 208 Z"/>
        <!-- Centre rosette -->
        <circle id="crossBoss" class="cross-arm" cx="200" cy="200" r="14" fill="url(#dimEngrave)" stroke="rgba(0,0,0,.3)" stroke-width="1"/>
        <circle cx="200" cy="200" r="8" fill="none" stroke="rgba(255,230,190,.08)" stroke-width=".8"/>
        <!-- Bowl beneath cross centre -->
        <ellipse cx="200" cy="248" rx="68" ry="44" fill="url(#bowlDeep)"/>
        <ellipse cx="200" cy="242" rx="54" ry="32" fill="none" stroke="rgba(255,235,200,.07)" stroke-width="1"/>
        <ellipse cx="200" cy="246" rx="38" ry="22" fill="none" stroke="rgba(0,0,0,.3)" stroke-width="2"/>
      </svg>
    </div>

    <div class="vignette"></div>
    <div class="scanline"></div>
    <p id="miracleWord">The font is awake.</p>

    <div class="cover" id="cover">
      <div id="coverContent">
        <p>This is the fixed camera view — what the font sees. Trace the sign in front of your laptop; the cross and LED ring respond.</p>
        <button class="btn" id="startBtn">Start</button>
      </div>
    </div>

    <div class="portrait" id="portrait">
      <div class="polaroid">
        <canvas id="shot"></canvas>
        <div class="cap">Blessed &#10007;</div>
      </div>
      <button class="btn ghost again" id="againBtn">Reset</button>
    </div>
  </div>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const ZONES = {
  "2": { x:0.3333, y:0.0, w:0.3333, h:0.3333 },
  "0": { x:0.3333, y:0.6666, w:0.3333, h:0.3334 },
  "4": { x:0.0, y:0.3333, w:0.3333, h:0.3333 },
  "6": { x:0.6666, y:0.3333, w:0.3334, h:0.3333 },
};
const SEQUENCE = ["2","0","4","6"];
const SEGMENTS = ["segHeaven","segEarth","segLeft","segRight"];
const WINDOW_MS = 6000;
const PALM = [0,5,9,17];
const PAD = 0.06;

function zoneAt(x,y){
  for (const [n,z] of Object.entries(ZONES)){
    if (x>=z.x-PAD && x<z.x+z.w+PAD && y>=z.y-PAD && y<z.y+z.h+PAD) return n;
  }
  return null;
}

class StateMachine {
  constructor(){ this.reset(); }
  reset(){ this.step=0; this.startedAt=null; this.lastZone=null; this.state="IDLE"; }
  get expected(){ return this.step<SEQUENCE.length ? SEQUENCE[this.step] : null; }
  update(zone, now){
    if (this.state==="IN_PROGRESS" && this.startedAt!=null && now-this.startedAt>WINDOW_MS){
      this.reset(); return {done:false, adv:false, reset:true};
    }
    const entered = zone!==this.lastZone ? zone : null;
    this.lastZone = zone;
    if (!entered) return {done:false, adv:false, reset:false};
    if (entered===this.expected){
      if (!this.step){ this.startedAt=now; this.state="IN_PROGRESS"; }
      this.step++;
      return {done:this.step>=SEQUENCE.length, adv:true, reset:false};
    }
    return {done:false, adv:false, reset:false};
  }
}

const video = document.getElementById("video");
const cover = document.getElementById("cover");
const coverContent = document.getElementById("coverContent");
const ledRing = document.getElementById("ledRing");
const ledDiffuse = document.getElementById("ledDiffuse");
const miracleWord = document.getElementById("miracleWord");
const portrait = document.getElementById("portrait");
const shot = document.getElementById("shot");

const sm = new StateMachine();
let landmarker, running=false, celebrating=false, lastVt=-1;

function resetVisuals(){
  for (const id of [...SEGMENTS,"crossBoss"]){
    const el = document.getElementById(id);
    el.classList.remove("lit","flash");
    el.setAttribute("fill","url(#dimEngrave)");
  }
  ledRing.classList.remove("miracle");
  ledRing.classList.add("on");
  ledDiffuse.style.animation = "ledRest 5.5s ease-in-out infinite";
}

function lightStep(n){
  const el = document.getElementById(SEGMENTS[n-1]);
  el.setAttribute("fill","url(#goldEngrave)");
  el.classList.add("lit","flash");
  el.addEventListener("animationend",()=>el.classList.remove("flash"),{once:true});
  if (n>=2){
    const b = document.getElementById("crossBoss");
    b.setAttribute("fill","url(#goldEngrave)");
    b.classList.add("lit");
  }
  ledRing.style.animation = "none";
  ledRing.offsetHeight;
  ledRing.style.animation = "ledRest 3s ease-in-out infinite";
}

async function loadModel(){
  coverContent.innerHTML = '<div class="spinner"></div>';
  const v = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  landmarker = await HandLandmarker.createFromOptions(v, {
    baseOptions:{
      modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate:"GPU",
    },
    runningMode:"VIDEO", numHands:1,
    minHandDetectionConfidence:.4, minHandPresenceConfidence:.4, minTrackingConfidence:.35,
  });
}

async function start(){
  try{
    if (!landmarker) await loadModel();
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"user",width:{ideal:1280},height:{ideal:720}}, audio:false,
    });
    video.srcObject = stream;
    await video.play();
    cover.classList.add("hidden");
    running = true;
    sm.reset();
    resetVisuals();
    ledRing.classList.add("on");
    lastVt = -1;
    requestAnimationFrame(tick);
  }catch(e){
    coverContent.innerHTML = `<p style="color:#b89090;font-size:12px">${e.message}</p><button class="btn" id="r">Retry</button>`;
    document.getElementById("r")?.addEventListener("click",()=>location.reload());
  }
}

function captureFontFrame(){
  const c = shot, ctx = c.getContext("2d");
  const stage = document.querySelector(".stage");
  c.width = stage.offsetWidth * 2;
  c.height = stage.offsetHeight * 2;
  ctx.fillStyle = "#080608";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.scale(2,2);
  const svg = document.querySelector(".font-cam");
  const data = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  const blob = new Blob([data], {type:"image/svg+xml"});
  const url = URL.createObjectURL(blob);
  img.onload = ()=>{ ctx.drawImage(img,0,0,stage.offsetWidth,stage.offsetHeight); URL.revokeObjectURL(url); };
  img.src = url;
}

function celebrate(){
  celebrating = true;
  for (const id of [...SEGMENTS,"crossBoss"]){
    const el = document.getElementById(id);
    el.setAttribute("fill","url(#goldEngrave)");
    el.classList.add("lit");
  }
  ledRing.classList.add("miracle");
  ledDiffuse.style.animation = "ledMiracle 4.5s ease-in-out forwards";
  miracleWord.classList.add("show");
  setTimeout(()=> portrait.classList.add("show"), 2600);
  try { captureFontFrame(); } catch(_){}
}

function resetAll(){
  portrait.classList.remove("show");
  miracleWord.classList.remove("show");
  celebrating = false;
  sm.reset();
  resetVisuals();
  lastVt = -1;
}

function tick(){
  if (!running) return;
  if (!celebrating && landmarker && video.readyState>=2 && video.currentTime!==lastVt){
    lastVt = video.currentTime;
    const res = landmarker.detectForVideo(video, performance.now());
    const now = performance.now();
    let r = {done:false,adv:false,reset:false};
    if (res.landmarks?.length){
      const lm = res.landmarks[0];
      let sx=0,sy=0;
      for (const i of PALM){ sx+=lm[i].x; sy+=lm[i].y; }
      const cx = Math.min(Math.max(1-sx/PALM.length,0),1);
      const cy = Math.min(Math.max(sy/PALM.length,0),1);
      r = sm.update(zoneAt(cx,cy), now);
    } else r = sm.update(null, now);
    if (r.reset) resetVisuals();
    if (r.adv) lightStep(sm.step);
    if (r.done) celebrate();
  }
  requestAnimationFrame(tick);
}

document.getElementById("startBtn").addEventListener("click", start);
document.getElementById("againBtn").addEventListener("click", resetAll);
</script>
</body>
</html>
