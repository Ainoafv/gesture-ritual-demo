<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Gesture Ritual — Live Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#060508; --ink:#efe7d8; --mute:#7a7268;
    --brass-soft:#e8d5a8; --line:rgba(201,168,106,.16);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:"Cormorant Garamond",Georgia,serif;
    background:radial-gradient(120% 90% at 50% -5%, #141018 0%, var(--bg) 50%);
    color:var(--ink); min-height:100dvh;
    display:flex; flex-direction:column; align-items:center;
    padding:max(20px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
  }
  h1 { font-weight:500; font-size:clamp(26px,5.5vw,40px); letter-spacing:.02em; text-align:center; }
  h1 .em { color:var(--brass-soft); font-style:italic; font-weight:400; }
  .tag {
    color:var(--mute); font-size:clamp(14px,3.5vw,16px); margin-top:10px;
    text-align:center; max-width:420px; line-height:1.55; font-style:italic; font-weight:400;
  }
  .stage {
    position:relative; flex:1; width:min(94vw, 480px);
    min-height:min(68dvh, 640px); max-height:76dvh;
    margin-top:20px; border-radius:4px; overflow:hidden;
    background:#030304;
    box-shadow:0 0 0 1px rgba(201,168,106,.06), 0 50px 120px rgba(0,0,0,.8);
  }
  /* Full-res capture — 1×1 px breaks hand tracking in Safari/Chrome */
  #video {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; transform:scaleX(-1);
    opacity:0; pointer-events:none; z-index:0;
  }
  .scene {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse 70% 55% at 50% 42%, #1a1510 0%, #080606 55%, #020202 100%);
  }
  .font-svg {
    width:78%; height:auto; max-height:72%; position:relative; z-index:2;
    filter:drop-shadow(0 24px 48px rgba(0,0,0,.65));
  }
  .vignette {
    position:absolute; inset:0; pointer-events:none; z-index:5;
    background:radial-gradient(ellipse 80% 70% at 50% 45%, transparent 30%, rgba(0,0,0,.65) 100%);
  }
  /* Resting halo — quiet life, never reacts per stroke */
  #haloRest {
    position:absolute; left:50%; top:43%; width:min(85vw, 420px); aspect-ratio:1;
    transform:translate(-50%,-50%); border-radius:50%; pointer-events:none; z-index:1;
    background:radial-gradient(circle,
      rgba(255,228,180,.55) 0%,
      rgba(240,190,120,.28) 35%,
      rgba(200,150,80,.08) 55%,
      transparent 70%);
    filter:blur(20px);
    animation:restingLife 7s ease-in-out infinite;
  }
  @keyframes restingLife {
    0%, 100% { opacity:.38; transform:translate(-50%,-50%) scale(.97); }
    50% { opacity:.52; transform:translate(-50%,-50%) scale(1.02); }
  }
  #halo {
    position:absolute; left:50%; top:43%; width:min(90vw, 440px); aspect-ratio:1;
    transform:translate(-50%,-50%) scale(.4); border-radius:50%; pointer-events:none; z-index:4;
    opacity:0;
    background:radial-gradient(circle,
      rgba(255,248,230,1) 0%,
      rgba(255,220,160,.8) 25%,
      rgba(240,180,100,.35) 45%,
      transparent 65%);
    filter:blur(12px);
  }
  #halo.miracle {
    animation:miracleOnly 4.5s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes miracleOnly {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(.5); filter:blur(18px); }
    18%  { opacity:.5; transform:translate(-50%,-50%) scale(.85); }
    35%  { opacity:1; transform:translate(-50%,-50%) scale(1.15); filter:blur(8px) brightness(1.2); }
    55%  { opacity:1; transform:translate(-50%,-50%) scale(1.18); filter:blur(6px) brightness(1.35); }
    100% { opacity:.35; transform:translate(-50%,-50%) scale(.92); filter:blur(16px); }
  }
  #miracleWord {
    position:absolute; left:0; right:0; top:12%; text-align:center;
    pointer-events:none; z-index:6; opacity:0;
    transition:opacity .8s ease .4s;
  }
  #miracleWord.show { opacity:1; }
  #miracleWord .line1 {
    display:block; font-size:clamp(15px,3.8vw,20px); letter-spacing:.42em;
    text-transform:uppercase; color:rgba(232,213,168,.8); font-weight:400;
    margin-bottom:10px;
  }
  #miracleWord .line2 {
    display:block; font-size:clamp(44px,11vw,72px); font-style:italic; font-weight:400;
    color:#fff6e8; text-shadow:0 0 70px rgba(255,210,140,.9), 0 2px 24px rgba(0,0,0,.45);
    letter-spacing:.06em; line-height:1.05;
  }
  .cover {
    position:absolute; inset:0; z-index:10; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end; padding-bottom:max(44px, env(safe-area-inset-bottom));
    background:linear-gradient(180deg, transparent 30%, rgba(4,3,5,.88) 100%);
    text-align:center;
  }
  .cover.hidden { display:none; }
  .cover p { color:var(--mute); font-size:15px; font-style:italic; max-width:320px; line-height:1.6; margin-bottom:20px; }
  .btn {
    font:500 13px "Cormorant Garamond",serif; letter-spacing:.12em; text-transform:uppercase;
    color:#1a1408; background:linear-gradient(180deg,#ecd9a8,#b8924a);
    border:none; padding:14px 40px; cursor:pointer;
    box-shadow:0 8px 28px rgba(180,140,70,.25);
  }
  .btn.ghost {
    background:transparent; color:var(--brass-soft); border:1px solid var(--line);
    text-transform:uppercase; letter-spacing:.15em; font-size:12px; padding:12px 28px;
    box-shadow:none;
  }
  .spinner {
    width:28px; height:28px; border:1px solid var(--line); border-top-color:var(--brass-soft);
    border-radius:50%; animation:spin .9s linear infinite; margin:0 auto 12px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .portrait {
    position:absolute; inset:0; z-index:11; display:flex; align-items:center; justify-content:center;
    background:rgba(2,2,3,.88); opacity:0; pointer-events:none; transition:opacity .7s ease;
  }
  .portrait.show { opacity:1; pointer-events:auto; }
  .polaroid {
    background:#f0ebe2; padding:8px 8px 36px; width:min(65%,240px);
    box-shadow:0 20px 50px rgba(0,0,0,.7);
    transform:translateY(16px); transition:transform .6s ease;
  }
  .portrait.show .polaroid { transform:translateY(0); }
  .polaroid canvas { width:100%; display:block; filter:contrast(1.03) sepia(.05); }
  .polaroid .cap { font-style:italic; font-size:18px; text-align:center; margin-top:10px; color:#2a2218; }
  .portrait .again { position:absolute; bottom:max(28px, env(safe-area-inset-bottom)); }
  .err { color:#c9a0a0; font-size:14px; font-style:italic; }
</style>
</head>
<body>
  <h1>The <span class="em">Sign of the Cross</span></h1>
  <p class="tag">A quiet warmth behind the brass. Nothing moves until the sign is complete.</p>

  <div class="stage">
    <video id="video" playsinline muted></video>

    <div class="scene">
      <div id="haloRest"></div>
      <svg class="font-svg" viewBox="0 0 400 480" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <radialGradient id="wallG" cx="50%" cy="42%" r="55%">
            <stop offset="0%" stop-color="#221c16"/><stop offset="100%" stop-color="#0a0806"/>
          </radialGradient>
          <radialGradient id="rimHalo" cx="50%" cy="48%" r="50%">
            <stop offset="72%" stop-color="rgba(255,210,140,0)"/>
            <stop offset="88%" stop-color="rgba(255,200,120,.18)"/>
            <stop offset="96%" stop-color="rgba(255,220,160,.08)"/>
            <stop offset="100%" stop-color="rgba(255,200,100,0)"/>
          </radialGradient>
          <linearGradient id="brassMain" x1="30%" y1="15%" x2="70%" y2="85%">
            <stop offset="0%" stop-color="#f2ddb0"/>
            <stop offset="22%" stop-color="#c9a05a"/>
            <stop offset="55%" stop-color="#8a6838"/>
            <stop offset="100%" stop-color="#3d2e18"/>
          </linearGradient>
          <linearGradient id="brassEdge" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fff0d0" stop-opacity=".55"/>
            <stop offset="50%" stop-color="#d4b070" stop-opacity=".1"/>
            <stop offset="100%" stop-color="#5a4020" stop-opacity=".4"/>
          </linearGradient>
          <radialGradient id="bowlIn" cx="50%" cy="55%" r="45%">
            <stop offset="0%" stop-color="#1a1208"/>
            <stop offset="45%" stop-color="#3d2a14"/>
            <stop offset="100%" stop-color="#6b5030"/>
          </radialGradient>
          <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".55"/>
          </filter>
          <filter id="specular">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
            <feOffset dy="1" result="off"/><feComposite in="off" in2="blur" operator="out" result="shadow"/>
            <feFlood flood-color="#fff8e0" flood-opacity=".25" result="color"/>
            <feComposite in="color" in2="shadow" operator="in" result="hl"/>
            <feMerge><feMergeNode in="hl"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <rect width="400" height="480" fill="url(#wallG)"/>
        <ellipse cx="200" cy="230" rx="168" ry="168" fill="url(#rimHalo)"/>
        <!-- Backplate shadow gap (15–20mm float feel) -->
        <ellipse cx="200" cy="232" rx="155" ry="155" fill="none" stroke="rgba(0,0,0,.35)" stroke-width="6"/>
        <!-- Main disc -->
        <circle cx="200" cy="228" r="138" fill="url(#brassMain)" filter="url(#softShadow)"/>
        <circle cx="200" cy="228" r="138" fill="none" stroke="url(#brassEdge)" stroke-width="2.5" opacity=".7"/>
        <!-- Specular crescent -->
        <ellipse cx="168" cy="188" rx="52" ry="38" fill="rgba(255,245,220,.22)" transform="rotate(-25 168 188)"/>
        <!-- Bowl -->
        <ellipse cx="200" cy="268" rx="72" ry="48" fill="url(#bowlIn)"/>
        <ellipse cx="200" cy="262" rx="58" ry="36" fill="none" stroke="rgba(255,230,190,.12)" stroke-width="1.5"/>
        <!-- Spout lip -->
        <path d="M 128 248 Q 108 258 112 278 Q 118 268 128 262 Z" fill="#6b5030" opacity=".85"/>
        <path d="M 128 250 Q 115 258 118 270" fill="none" stroke="rgba(255,220,160,.15)" stroke-width="1"/>
        <!-- Cross engraving hint (very subtle) -->
        <g opacity=".08" stroke="#fff8e0" stroke-width="1.2" fill="none">
          <line x1="200" y1="198" x2="200" y2="318"/>
          <line x1="158" y1="248" x2="242" y2="248"/>
        </g>
      </svg>
      <div id="halo"></div>
    </div>

    <div class="vignette"></div>

    <div id="miracleWord">
      <span class="line1">The font</span>
      <span class="line2">awakens</span>
    </div>

    <div class="cover" id="cover">
      <div id="coverContent">
        <p>Allow the camera. Trace the sign in the air in front of you — above, below, left, right. The brass stays still until the cross is whole.</p>
        <button class="btn" id="startBtn">Begin</button>
      </div>
    </div>

    <div class="portrait" id="portrait">
      <div class="polaroid">
        <canvas id="shot"></canvas>
        <div class="cap">Blessed &#10007;</div>
      </div>
      <button class="btn ghost again" id="againBtn">Again</button>
    </div>
  </div>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const ZONES = {
  "1": { x:0.0,    y:0.0,    w:0.3333, h:0.3333 },
  "2": { x:0.3333, y:0.0,    w:0.3333, h:0.3333 },
  "3": { x:0.6666, y:0.0,    w:0.3334, h:0.3333 },
  "4": { x:0.0,    y:0.3333, w:0.3333, h:0.3333 },
  "8": { x:0.3333, y:0.3333, w:0.3333, h:0.3333 },
  "6": { x:0.6666, y:0.3333, w:0.3334, h:0.3333 },
  "7": { x:0.0,    y:0.6666, w:0.3333, h:0.3334 },
  "0": { x:0.3333, y:0.6666, w:0.3333, h:0.3334 },
  "5": { x:0.6666, y:0.6666, w:0.3334, h:0.3334 },
};
const SEQUENCE = ["2","0","4","6"];
const WINDOW_MS = 5500;
const PALM = [0,5,9,17];
const ZONE_PAD = 0.06;

function zoneAt(x,y){
  for (const [name,z] of Object.entries(ZONES)){
    if (x>=z.x-ZONE_PAD && x<z.x+z.w+ZONE_PAD && y>=z.y-ZONE_PAD && y<z.y+z.h+ZONE_PAD) return name;
  }
  return null;
}

class StateMachine {
  constructor(){ this.reset(); }
  reset(){ this.step=0; this.startedAt=null; this.lastZone=null; this.state="IDLE"; }
  get expected(){ return this.step < SEQUENCE.length ? SEQUENCE[this.step] : null; }
  update(zone, now){
    if (this.state==="IN_PROGRESS" && this.startedAt!==null && now-this.startedAt>WINDOW_MS) this.reset();
    const entered = zone!==this.lastZone ? zone : null;
    this.lastZone = zone;
    if (entered===null) return false;
    if (entered===this.expected){
      if (this.step===0){ this.startedAt=now; this.state="IN_PROGRESS"; }
      this.step++;
      if (this.step>=SEQUENCE.length){ this.state="COMPLETE"; return true; }
    }
    return false;
  }
}

const video = document.getElementById("video");
const cover = document.getElementById("cover");
const coverContent = document.getElementById("coverContent");
const startBtn = document.getElementById("startBtn");
const halo = document.getElementById("halo");
const haloRest = document.getElementById("haloRest");
const miracleWord = document.getElementById("miracleWord");
const portrait = document.getElementById("portrait");
const againBtn = document.getElementById("againBtn");
const shot = document.getElementById("shot");

const sm = new StateMachine();
let landmarker = null;
let running = false;
let celebrating = false;
let lastVideoTime = -1;

async function loadModel(){
  coverContent.innerHTML = '<div class="spinner"></div><p style="color:var(--mute);font-style:italic">One moment</p>';
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  landmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU",
    },
    runningMode: "VIDEO",
    numHands: 1,
    minHandDetectionConfidence: 0.45,
    minHandPresenceConfidence: 0.45,
    minTrackingConfidence: 0.4,
  });
}

async function start(){
  try {
    if (!landmarker) await loadModel();
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"user", width:{ideal:1280}, height:{ideal:960} }, audio:false
    });
    video.srcObject = stream;
    await video.play();
    cover.classList.add("hidden");
    running = true;
    sm.reset();
    requestAnimationFrame(loop);
  } catch (e){
    cover.classList.remove("hidden");
    coverContent.innerHTML = '<p class="err">Camera unavailable.</p><button class="btn" id="retryBtn">Retry</button>';
    document.getElementById("retryBtn")?.addEventListener("click", () => location.reload());
  }
}

function celebrate(){
  celebrating = true;
  haloRest.style.transition = "opacity 1.2s ease";
  haloRest.style.opacity = "0.15";
  halo.classList.add("miracle");
  miracleWord.classList.add("show");
  const sctx = shot.getContext("2d");
  shot.width = video.videoWidth; shot.height = video.videoHeight;
  sctx.translate(shot.width,0); sctx.scale(-1,1);
  sctx.drawImage(video,0,0,shot.width,shot.height);
  setTimeout(()=> portrait.classList.add("show"), 2800);
}

function resetAll(){
  portrait.classList.remove("show");
  miracleWord.classList.remove("show");
  halo.classList.remove("miracle");
  halo.style.opacity = "0";
  haloRest.style.opacity = "";
  haloRest.style.transition = "";
  const sctx = shot.getContext("2d");
  sctx.setTransform(1,0,0,1,0,0);
  sctx.clearRect(0,0,shot.width,shot.height);
  celebrating = false;
  sm.reset();
}

function loop(){
  if (!running) return;

  if (!celebrating && landmarker && video.readyState >= 2
      && video.currentTime !== lastVideoTime){
    lastVideoTime = video.currentTime;
    const res = landmarker.detectForVideo(video, performance.now());
    const now = performance.now();
    if (res.landmarks?.length){
      const lm = res.landmarks[0];
      let sx=0, sy=0;
      for (const i of PALM){ sx+=lm[i].x; sy+=lm[i].y; }
      const cx = Math.min(Math.max(1-(sx/PALM.length),0),1);
      const cy = Math.min(Math.max(sy/PALM.length, 0), 1);
      if (sm.update(zoneAt(cx,cy), now)) celebrate();
    } else {
      sm.update(null, now);
    }
  }
  requestAnimationFrame(loop);
}

startBtn.addEventListener("click", start);
againBtn.addEventListener("click", resetAll);
</script>
</body>
</html>
