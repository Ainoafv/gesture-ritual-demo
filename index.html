<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Gesture Ritual — Live Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#020203;
    --ink:#f1eadc;
    --mute:rgba(241,234,220,.55);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:radial-gradient(120% 90% at 50% -10%, #131019 0%, var(--bg) 55%);
    min-height:100dvh;
    display:flex; align-items:center; justify-content:center;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    color:var(--ink);
    font-family:Inter,system-ui,sans-serif;
  }
  /* Full-resolution hidden feed — 1×1 breaks MediaPipe on Safari/Chrome */
  #video {
    position:fixed; inset:0; width:100%; height:100%;
    object-fit:cover; opacity:0; pointer-events:none; z-index:-1;
  }
  .stage {
    position:relative; width:min(100vw,440px); height:min(92dvh,780px);
    overflow:hidden;
    background:#050504;
    box-shadow:0 0 0 1px rgba(255,255,255,.05), 0 42px 110px rgba(0,0,0,.9);
  }
  .scene { width:100%; height:100%; display:block; }

  .cross-overlay {
    position:absolute; inset:0; z-index:12; pointer-events:none;
  }
  .cross-stem {
    stroke:rgba(255,230,190,.14);
    stroke-width:2.5;
    fill:none;
    stroke-linecap:round;
  }
  .gesture-dot {
    fill:rgba(255,220,160,.22);
    stroke:rgba(255,235,200,.35);
    stroke-width:2;
    transition:fill .45s ease, stroke .45s ease, filter .45s ease, opacity .45s ease;
  }
  .gesture-dot.next {
    fill:rgba(255,220,160,.38);
    stroke:rgba(255,240,210,.65);
    animation:dotPulse 1.6s ease-in-out infinite;
  }
  .gesture-dot.lit {
    fill:#fff8e8;
    stroke:#f0d070;
    filter:url(#dotGlow);
    animation:none;
  }
  .gesture-dot.flash { animation:dotFlash .55s ease-out; }
  @keyframes dotPulse {
    0%, 100% { opacity:.75; }
    50% { opacity:1; }
  }
  @keyframes dotFlash {
    40% { filter:url(#dotBurst); }
  }

  #miracleWord {
    position:absolute; left:0; right:0; top:12%; z-index:20;
    text-align:center; pointer-events:none; opacity:0;
    font-family:"Cormorant Garamond",serif;
    font-size:clamp(38px,10vw,56px);
    font-weight:600;
    letter-spacing:.02em;
    color:#fff7ea;
    text-shadow:0 0 70px rgba(255,210,140,.9), 0 6px 34px rgba(0,0,0,.9);
    transition:opacity .9s ease .35s;
  }
  #miracleWord .pill {
    display:inline-block;
    padding:10px 16px 12px;
    border-radius:999px;
    background:rgba(0,0,0,.28);
    border:1px solid rgba(255,235,200,.08);
    box-shadow:0 10px 40px rgba(0,0,0,.35);
    backdrop-filter:blur(6px);
  }
  #miracleWord.show { opacity:1; }

  .cover {
    position:absolute; inset:0; z-index:30;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    padding:0 28px max(36px, env(safe-area-inset-bottom));
    background:linear-gradient(180deg, transparent 55%, rgba(0,0,0,.92) 100%);
    text-align:center;
  }
  .cover.hidden { display:none; }
  .cover p {
    color:var(--mute);
    font-size:12.5px;
    line-height:1.6;
    max-width:300px;
    margin-bottom:16px;
  }
  .btn {
    font:500 12px Inter,sans-serif;
    letter-spacing:.12em;
    text-transform:uppercase;
    background:linear-gradient(180deg, rgba(255,235,200,.98), rgba(226,182,110,.92));
    color:#120e08;
    border:none;
    padding:12px 28px;
    cursor:pointer;
  }
  .btn.ghost {
    background:transparent;
    color:rgba(255,235,200,.8);
    border:1px solid rgba(255,235,200,.18);
    padding:10px 20px;
    font-size:11px;
  }
  .spinner {
    width:18px; height:18px;
    border:1px solid rgba(255,235,200,.18);
    border-top-color:rgba(255,235,200,.75);
    border-radius:50%;
    animation:spin .7s linear infinite;
    margin:0 auto 10px;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  .led-fill { opacity:.22; transition:opacity .8s ease, filter .8s ease; }
  .stage.awake .led-fill { opacity:.42; }
  .stage.miracle .led-fill {
    opacity:1;
    filter:url(#ledBright);
    animation:ledPulse 4.2s ease-in-out forwards;
  }
  .stage.miracle #miracleWord .pill {
    border-color:rgba(255,235,200,.22);
    box-shadow:
      0 14px 55px rgba(0,0,0,.45),
      0 0 28px rgba(255,210,140,.45),
      inset 0 0 18px rgba(255,230,180,.16);
  }
  @keyframes ledPulse {
    0% { opacity:.25; }
    25% { opacity:1; }
    55% { opacity:1; }
    100% { opacity:.5; }
  }
  .led-bead { fill:rgba(255,215,150,.12); transition:fill .6s ease, filter .6s ease, opacity .6s ease; opacity:.75; }
  .stage.awake .led-bead { fill:rgba(255,220,160,.28); filter:url(#ledSoft); opacity:.9; }
  .stage.miracle .led-bead { fill:#fffef0; filter:url(#ledBright); opacity:1; animation:beadSpark 1.8s ease-in-out infinite; }
  .stage.miracle .led-bead:nth-child(3n) { animation-delay:.18s; }
  .stage.miracle .led-bead:nth-child(3n+1) { animation-delay:.36s; }
  @keyframes beadSpark { 0%, 100% { opacity:.75; } 50% { opacity:1; } }

  .portrait {
    position:absolute; inset:0; z-index:31; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.94); opacity:0; pointer-events:none; transition:opacity .55s;
  }
  .portrait.show { opacity:1; pointer-events:auto; }
  .polaroid { background:#e6e0d4; padding:6px 6px 26px; width:min(50%,170px); }
  .polaroid .cap { font-family:"Cormorant Garamond",serif; font-size:16px; text-align:center; margin-top:6px; color:#2a2218; }
  .portrait .again { position:absolute; bottom:max(20px, env(safe-area-inset-bottom)); }

  #debugHud {
    position:absolute; left:14px; bottom:14px; z-index:25;
    font:500 11px Inter,system-ui,sans-serif;
    color:rgba(241,234,220,.75);
    background:rgba(0,0,0,.45);
    border:1px solid rgba(255,235,200,.12);
    padding:8px 10px;
    backdrop-filter:blur(6px);
    display:none;
    white-space:pre-line;
  }
  #debugHud.on { display:block; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <video id="video" playsinline muted></video>

    <svg class="scene" viewBox="0 0 400 720" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bgNight" cx="50%" cy="28%" r="75%">
          <stop offset="0%" stop-color="#1c1620"/><stop offset="100%" stop-color="#030303"/>
        </radialGradient>
        <linearGradient id="archGold" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f8ecc8"/><stop offset="40%" stop-color="#c89848"/>
          <stop offset="100%" stop-color="#5a4018"/>
        </linearGradient>
        <linearGradient id="plateGold" x1="20%" y1="0%" x2="80%" y2="100%">
          <stop offset="0%" stop-color="#f0dc98"/><stop offset="50%" stop-color="#a88040"/>
          <stop offset="100%" stop-color="#2a1c0a"/>
        </linearGradient>
        <radialGradient id="ledRingFill" cx="50%" cy="50%" r="50%">
          <stop offset="70%" stop-color="rgba(255,220,160,0)"/>
          <stop offset="88%" stop-color="rgba(255,210,140,.35)"/>
          <stop offset="96%" stop-color="rgba(255,235,200,.55)"/>
          <stop offset="100%" stop-color="rgba(255,200,120,0)"/>
        </radialGradient>
        <filter id="ledSoft"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="ledBright"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      <rect width="400" height="720" fill="url(#bgNight)"/>
      <ellipse cx="200" cy="360" rx="130" ry="170" fill="rgba(255,248,240,.04)"/>
      <path fill="none" stroke="url(#archGold)" stroke-width="10"
        d="M 55 520 L 55 280 Q 55 120 200 95 Q 345 120 345 280 L 345 520"/>
      <path fill="none" stroke="rgba(255,240,210,.12)" stroke-width="2"
        d="M 68 510 L 68 285 Q 68 135 200 112 Q 332 135 332 285 L 332 510"/>
      <path fill="none" stroke="url(#archGold)" stroke-width="6" opacity=".5"
        d="M55 520 Q48 420 55 320 Q62 220 55 120"/>
      <path fill="none" stroke="url(#archGold)" stroke-width="6" opacity=".5"
        d="M345 520 Q352 420 345 320 Q338 220 345 120"/>

      <circle cx="200" cy="360" r="168" class="led-fill" fill="url(#ledRingFill)" filter="url(#ledSoft)"/>
      <g id="ledBeads"></g>

      <circle cx="200" cy="360" r="8" fill="#080604"/>
      <circle cx="200" cy="360" r="132" fill="url(#plateGold)" stroke="rgba(255,235,200,.12)" stroke-width="2"/>
      <ellipse cx="168" cy="328" rx="48" ry="34" fill="rgba(255,250,235,.12)" transform="rotate(-15 168 328)"/>

      <ellipse cx="200" cy="410" rx="58" ry="36" fill="#0a0806"/>
      <ellipse cx="200" cy="404" rx="46" ry="28" fill="#1a140c" stroke="rgba(255,230,200,.06)" stroke-width="1"/>
    </svg>

    <!-- Four target dots on a crucifix — matches 3×3 detection grid -->
    <svg class="cross-overlay" viewBox="0 0 400 720" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <filter id="dotGlow">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feFlood flood-color="#ffe8a0" flood-opacity=".85" result="c"/>
          <feComposite in="c" in2="b" operator="in" result="g"/>
          <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="dotBurst">
          <feGaussianBlur stdDeviation="6" result="b"/>
          <feFlood flood-color="#fff8e8" flood-opacity="1" result="c"/>
          <feComposite in="c" in2="b" operator="in" result="g"/>
          <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <g id="crossGuide">
        <line class="cross-stem" x1="200" y1="228" x2="200" y2="492"/>
        <line class="cross-stem" x1="118" y1="360" x2="282" y2="360"/>
        <circle id="dotHeaven" class="gesture-dot next" cx="200" cy="228" r="13"/>
        <circle id="dotEarth"  class="gesture-dot"       cx="200" cy="492" r="13"/>
        <circle id="dotLeft"   class="gesture-dot"       cx="118" cy="360" r="13"/>
        <circle id="dotRight"  class="gesture-dot"       cx="282" cy="360" r="13"/>
        <circle cx="200" cy="360" r="7" fill="rgba(255,230,190,.18)" stroke="rgba(255,235,200,.2)" stroke-width="1"/>
      </g>
    </svg>

    <p id="miracleWord"><span class="pill">The font is awake.</span></p>
    <div id="debugHud"></div>

    <div class="cover" id="cover">
      <div id="coverContent">
        <p>Allow the camera. Sit about arm's length away. Reach each glowing dot — top, bottom, left, right. No need to be exact.</p>
        <button class="btn" id="startBtn">Begin</button>
      </div>
    </div>

    <div class="portrait" id="portrait">
      <div class="polaroid"><canvas id="shot"></canvas><div class="cap">Blessed &#10007;</div></div>
      <button class="btn ghost again" id="againBtn">Again</button>
    </div>
  </div>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

// Production uses config/zones.json (calibrated on-site). Webcam demo uses wider
// forgiving targets — guests won't stand at a fixed distance from a laptop.
const TARGETS = {
  "2": { x: 0.18, y: 0.00, w: 0.64, h: 0.44 }, // heaven — wide top band
  "0": { x: 0.18, y: 0.56, w: 0.64, h: 0.44 }, // earth — wide bottom band
  "4": { x: 0.00, y: 0.18, w: 0.50, h: 0.64 }, // left — tall left band
  "6": { x: 0.50, y: 0.18, w: 0.50, h: 0.64 }, // right — tall right band
};
const SEQUENCE = ["2", "0", "4", "6"];
const DOTS = ["dotHeaven", "dotEarth", "dotLeft", "dotRight"];
const WINDOW_MS = 10000;
const PALM = [0, 5, 9, 17];
const SMOOTH = 0.45;
const DEBUG = new URLSearchParams(location.search).get("debug") === "1";
const debugHud = document.getElementById("debugHud");
if (DEBUG) debugHud.classList.add("on");

function inTarget(name, x, y) {
  const t = TARGETS[name];
  return x >= t.x && x < t.x + t.w && y >= t.y && y < t.y + t.h;
}

function zoneAt(x, y, expected) {
  // Prefer the step we're waiting for — avoids sticky overlap between bands.
  if (expected && inTarget(expected, x, y)) return expected;
  for (const name of SEQUENCE) {
    if (inTarget(name, x, y)) return name;
  }
  return null;
}

/** Boundary-entry state machine — mirrors holy-font/src/state_machine.py */
class SM {
  reset() {
    this.step = 0;
    this.t0 = null;
    this.lastZone = null;
    this.state = "IDLE";
  }
  constructor() { this.reset(); }
  get exp() { return this.step < 4 ? SEQUENCE[this.step] : null; }
  upd(zone, now) {
    if (this.state === "IN_PROGRESS" && this.t0 && now - this.t0 > WINDOW_MS) {
      this.reset();
      return { done: false, advance: false, reset: true };
    }
    const entered = zone !== this.lastZone ? zone : null;
    this.lastZone = zone;
    if (!entered || entered !== this.exp) {
      return { done: false, advance: false, reset: false };
    }
    if (this.step === 0) {
      this.t0 = now;
      this.state = "IN_PROGRESS";
    }
    this.step++;
    return { done: this.step >= 4, advance: true, reset: false };
  }
}

const beads = document.getElementById("ledBeads");
const CX = 200, CY = 360, R = 162, N = 36;
for (let i = 0; i < N; i++) {
  const a = (i / N) * Math.PI * 2 - Math.PI / 2;
  const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  c.setAttribute("class", "led-bead");
  c.setAttribute("cx", CX + R * Math.cos(a));
  c.setAttribute("cy", CY + R * Math.sin(a));
  c.setAttribute("r", i % 3 === 0 ? 3.2 : 2.2);
  beads.appendChild(c);
}

const stage = document.getElementById("stage");
const video = document.getElementById("video");
const cover = document.getElementById("cover");
const coverContent = document.getElementById("coverContent");
const miracleWord = document.getElementById("miracleWord");
const sm = new SM();
let lm, run = false, celeb = false, frameTs = -1;
let sx = 0.5, sy = 0.5, hasSmooth = false;

function updateDotHints() {
  DOTS.forEach((id, i) => {
    const el = document.getElementById(id);
    el.classList.remove("next", "lit", "flash");
    if (i < sm.step) el.classList.add("lit");
    else if (i === sm.step && !celeb) el.classList.add("next");
  });
}

function captureSceneToPolaroid() {
  const canvas = document.getElementById("shot");
  const ctx = canvas.getContext("2d");
  const stageEl = document.getElementById("stage");
  const w = stageEl.clientWidth;
  const h = stageEl.clientHeight;
  canvas.width = Math.max(320, Math.floor(w * 2));
  canvas.height = Math.max(320, Math.floor(h * 2));
  ctx.fillStyle = "#060508";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const svg = document.querySelector("svg.scene");
  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], { type: "image/svg+xml" });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function resetVis() {
  DOTS.forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove("lit", "flash");
  });
  stage.classList.remove("miracle");
  stage.classList.add("awake");
  document.querySelectorAll(".led-bead").forEach(b => b.classList.remove("on"));
  updateDotHints();
}

function lightStep(n) {
  const el = document.getElementById(DOTS[n - 1]);
  el.classList.remove("next");
  el.classList.add("lit", "flash");
  el.addEventListener("animationend", () => el.classList.remove("flash"), { once: true });
  document.querySelectorAll(".led-bead").forEach((b, i) => { if (i < n * 6) b.classList.add("on"); });
  updateDotHints();
}

const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

async function loadModel() {
  coverContent.innerHTML = '<div class="spinner"></div><p style="color:var(--mute);font-size:11px;margin-top:8px">Loading vision model…</p>';
  const wasm = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  const baseOptions = {
    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
  };
  const opts = {
    runningMode: "VIDEO",
    numHands: 1,
    minHandDetectionConfidence: 0.5,
    minHandPresenceConfidence: 0.5,
    minTrackingConfidence: 0.5,
  };
  const delegates = isSafari ? ["CPU", "GPU"] : ["GPU", "CPU"];
  let lastErr;
  for (const delegate of delegates) {
    try {
      lm = await HandLandmarker.createFromOptions(wasm, {
        baseOptions: { ...baseOptions, delegate },
        ...opts,
      });
      return;
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr ?? new Error("Could not load hand model");
}

async function start() {
  try {
    if (!lm) await loadModel();
    video.srcObject = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    await video.play();
    cover.classList.add("hidden");
    run = true;
    sm.reset();
    resetVis();
    stage.classList.add("awake");
    frameTs = -1;
    requestAnimationFrame(tick);
  } catch (e) {
    coverContent.innerHTML = `<p style="color:#b89090;font-size:11px;line-height:1.5">${e.message}</p><button class="btn" id="r">Retry</button>`;
    document.getElementById("r")?.addEventListener("click", () => location.reload());
  }
}

function celebrate() {
  celeb = true;
  run = false;
  DOTS.forEach(id => document.getElementById(id).classList.add("lit"));
  stage.classList.remove("awake");
  stage.classList.add("miracle");
  document.querySelectorAll(".led-bead").forEach(b => b.classList.add("on"));
  miracleWord.classList.add("show");
  captureSceneToPolaroid();
  setTimeout(() => document.getElementById("portrait").classList.add("show"), 2200);
}

function resetAll() {
  document.getElementById("portrait").classList.remove("show");
  miracleWord.classList.remove("show");
  celeb = false;
  sm.reset();
  resetVis();
  hasSmooth = false;
  frameTs = -1;
  run = true;
  requestAnimationFrame(tick);
}

function tick() {
  if (!run) return;
  if (lm && video.readyState >= 2) {
    const ts = performance.now();
    if (ts !== frameTs) {
      frameTs = ts;
      const res = lm.detectForVideo(video, ts);
      let zone = null;
      let result = { done: false, advance: false, reset: false };

      if (res.landmarks?.length) {
        const L = res.landmarks[0];
        let tx = 0, ty = 0;
        for (const i of PALM) { tx += L[i].x; ty += L[i].y; }
        tx = Math.min(Math.max(1 - tx / 4, 0), 1);
        ty = Math.min(Math.max(ty / 4, 0), 1);
        if (!hasSmooth) { sx = tx; sy = ty; hasSmooth = true; }
        sx = sx * (1 - SMOOTH) + tx * SMOOTH;
        sy = sy * (1 - SMOOTH) + ty * SMOOTH;
        zone = zoneAt(sx, sy, sm.exp);
        result = sm.upd(zone, ts);
      } else {
        hasSmooth = false;
        result = sm.upd(null, ts);
      }

      if (result.reset) resetVis();
      if (result.advance) lightStep(sm.step);
      if (result.done) celebrate();

      if (DEBUG) {
        debugHud.textContent =
          `zone=${zone ?? "—"}  step=${sm.step}/4  next=${sm.exp ?? "—"}\n` +
          `x=${sx.toFixed(2)} y=${sy.toFixed(2)}  last=${sm.lastZone ?? "—"}`;
      }
    }
  }
  requestAnimationFrame(tick);
}

document.getElementById("startBtn").addEventListener("click", start);
document.getElementById("againBtn").addEventListener("click", resetAll);
</script>
</body>
</html>
