<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Gesture Ritual — Live Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#ebe3d4; --mute:#8a8278; --gold:#e8c878; --line:rgba(196,160,98,.25); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:Inter,system-ui,sans-serif; background:#030304; color:var(--ink);
    min-height:100dvh; display:flex; flex-direction:column; align-items:center;
    padding:max(12px, env(safe-area-inset-top)) 0 max(12px, env(safe-area-inset-bottom));
  }
  .header { text-align:center; padding:0 16px 8px; z-index:20; }
  h1 {
    font-family:"Cormorant Garamond",serif; font-weight:600;
    font-size:clamp(24px,5vw,32px); letter-spacing:.02em;
  }
  .tag { color:var(--mute); font-size:12px; margin-top:4px; }
  .stage {
    position:relative; flex:1; width:100%; max-width:520px;
    min-height:min(78dvh, 780px); margin-top:4px;
    overflow:hidden; background:#000;
    border-radius:2px;
    box-shadow:0 0 0 1px rgba(255,255,255,.05), 0 32px 80px rgba(0,0,0,.85);
  }
  /* Live camera — full frame, mirrored */
  #video {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; transform:scaleX(-1);
  }
  .cam-grade {
    position:absolute; inset:0; pointer-events:none; z-index:1;
    background:
      radial-gradient(ellipse 90% 80% at 50% 48%, transparent 25%, rgba(0,0,0,.55) 100%),
      linear-gradient(180deg, rgba(20,14,8,.35) 0%, transparent 30%, transparent 70%, rgba(10,8,6,.5) 100%);
  }
  /* Cross overlay — same 0–1 space as gesture zones */
  .cross-layer {
    position:absolute; inset:0; z-index:3; pointer-events:none;
    width:100%; height:100%;
  }
  .cross-arm {
    transition:opacity .35s ease, filter .35s ease;
    opacity:.22;
  }
  .cross-arm.lit {
    opacity:1;
    filter:url(#armGlow);
  }
  .cross-arm.flash { animation:armBurst .65s ease-out; }
  @keyframes armBurst {
    0%   { opacity:.22; }
    30%  { opacity:1; filter:url(#armBurst); }
    100% { opacity:1; filter:url(#armGlow); }
  }
  .cross-groove { opacity:.5; }
  #crossAura {
    opacity:.06; transition:opacity .4s ease;
  }
  #crossAura.s1 { opacity:.15; }
  #crossAura.s2 { opacity:.25; }
  #crossAura.s3 { opacity:.38; }
  #crossAura.s4 { opacity:.55; }
  #haloRest {
    position:absolute; left:50%; top:50%; width:85%; aspect-ratio:1;
    transform:translate(-50%,-50%); border-radius:50%; z-index:2; pointer-events:none;
    background:radial-gradient(circle, rgba(255,210,140,.35) 0%, transparent 65%);
    filter:blur(24px); opacity:.35;
    animation:haloIdle 7s ease-in-out infinite;
  }
  @keyframes haloIdle {
    0%,100% { opacity:.28; transform:translate(-50%,-50%) scale(.96); }
    50% { opacity:.4; transform:translate(-50%,-50%) scale(1.02); }
  }
  #halo {
    position:absolute; inset:0; z-index:5; pointer-events:none; opacity:0;
    background:radial-gradient(circle at 50% 50%, rgba(255,245,220,.95) 0%, rgba(255,200,120,.4) 35%, transparent 60%);
    filter:blur(8px);
  }
  #halo.miracle { animation:miracle 4s ease-in-out forwards; }
  @keyframes miracle {
    0%   { opacity:0; transform:scale(.8); }
    25%  { opacity:1; transform:scale(1.05); }
    60%  { opacity:1; }
    100% { opacity:.2; transform:scale(1); }
  }
  #miracleWord {
    position:absolute; left:0; right:0; top:8%; z-index:7; text-align:center;
    pointer-events:none; opacity:0;
    font-family:"Cormorant Garamond",serif;
    font-size:clamp(34px,9vw,56px); font-weight:600; color:#f8f0e0;
    text-shadow:0 0 40px rgba(255,200,120,.6), 0 2px 20px rgba(0,0,0,.8);
    transition:opacity .6s ease .3s;
  }
  #miracleWord.show { opacity:1; }
  .cover {
    position:absolute; inset:0; z-index:12;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    padding:0 20px max(36px, env(safe-area-inset-bottom));
    background:linear-gradient(180deg, rgba(0,0,0,.2) 0%, rgba(0,0,0,.88) 100%);
    text-align:center;
  }
  .cover.hidden { display:none; }
  .cover p { color:var(--mute); font-size:13px; max-width:320px; line-height:1.6; margin-bottom:16px; }
  .btn {
    font:500 11px Inter,sans-serif; letter-spacing:.1em; text-transform:uppercase;
    background:var(--gold); color:#120e08; border:none; padding:13px 28px; cursor:pointer;
  }
  .btn.ghost {
    background:transparent; color:var(--gold); border:1px solid var(--line);
    font-size:10px; padding:10px 20px;
  }
  .spinner {
    width:22px; height:22px; border:2px solid var(--line); border-top-color:var(--gold);
    border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 8px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .portrait {
    position:absolute; inset:0; z-index:13; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.88); opacity:0; pointer-events:none; transition:opacity .5s;
  }
  .portrait.show { opacity:1; pointer-events:auto; }
  .polaroid {
    background:#ece6da; padding:8px 8px 30px; width:min(58%,200px);
    box-shadow:0 16px 40px rgba(0,0,0,.7);
  }
  .polaroid canvas { width:100%; display:block; }
  .polaroid .cap {
    font-family:"Cormorant Garamond",serif; font-size:16px; font-weight:500;
    text-align:center; margin-top:8px; color:#2a2218;
  }
  .portrait .again { position:absolute; bottom:max(20px, env(safe-area-inset-bottom)); }
  .err { color:#b89090; font-size:13px; }
</style>
</head>
<body>
  <header class="header">
    <h1>Sign of the Cross</h1>
    <p class="tag">Gesture prototype · camera aligned to cross zones</p>
  </header>

  <div class="stage">
    <video id="video" playsinline muted autoplay></video>
    <div class="cam-grade"></div>
    <div id="haloRest"></div>

    <!-- Cross in normalized 0–1 coords = same grid as MediaPipe zones -->
    <svg class="cross-layer" viewBox="0 0 1 1" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="goldFill" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#fffef0"/>
          <stop offset="40%" stop-color="#f0d080"/>
          <stop offset="100%" stop-color="#b87828"/>
        </linearGradient>
        <linearGradient id="grooveFill" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#1a140c"/>
          <stop offset="100%" stop-color="#0a0806"/>
        </linearGradient>
        <radialGradient id="auraGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(255,220,150,.7)"/>
          <stop offset="100%" stop-color="rgba(255,180,80,0)"/>
        </radialGradient>
        <filter id="armGlow" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="0.008" result="b"/>
          <feFlood flood-color="#ffe8a0" flood-opacity=".9" result="c"/>
          <feComposite in="c" in2="b" operator="in" result="g"/>
          <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="armBurst" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="0.015" result="b"/>
          <feFlood flood-color="#fff8e0" flood-opacity="1" result="c"/>
          <feComposite in="c" in2="b" operator="in" result="g"/>
          <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Aura behind cross centre (zone 8 / intersection) -->
      <circle id="crossAura" cx="0.5" cy="0.5" r="0.22" fill="url(#auraGrad)"/>

      <!-- Full cross groove silhouette -->
      <g class="cross-groove" fill="url(#grooveFill)" stroke="rgba(0,0,0,.4)" stroke-width="0.002">
        <!-- Heaven — zone 2 -->
        <path d="M 0.46 0.50 L 0.46 0.34 Q 0.46 0.12 0.50 0.04 Q 0.54 0.12 0.54 0.34 L 0.54 0.50 Z"/>
        <!-- Earth — zone 0 -->
        <path d="M 0.46 0.50 L 0.46 0.66 Q 0.46 0.88 0.50 0.96 Q 0.54 0.88 0.54 0.66 L 0.54 0.50 Z"/>
        <!-- Left — zone 4 -->
        <path d="M 0.50 0.46 L 0.34 0.46 Q 0.12 0.50 0.04 0.50 Q 0.12 0.54 0.34 0.54 L 0.50 0.54 Z"/>
        <!-- Right — zone 6 -->
        <path d="M 0.50 0.46 L 0.66 0.46 Q 0.88 0.50 0.96 0.50 Q 0.88 0.54 0.66 0.54 L 0.50 0.54 Z"/>
        <!-- Centre boss -->
        <circle cx="0.5" cy="0.5" r="0.045" fill="url(#grooveFill)"/>
        <circle cx="0.5" cy="0.5" r="0.028" fill="#2a2010"/>
      </g>

      <!-- Lit segments (same paths, gold) -->
      <path id="segHeaven" class="cross-arm" fill="url(#grooveFill)"
        d="M 0.46 0.50 L 0.46 0.34 Q 0.46 0.12 0.50 0.04 Q 0.54 0.12 0.54 0.34 L 0.54 0.50 Z"/>
      <path id="segEarth" class="cross-arm" fill="url(#grooveFill)"
        d="M 0.46 0.50 L 0.46 0.66 Q 0.46 0.88 0.50 0.96 Q 0.54 0.88 0.54 0.66 L 0.54 0.50 Z"/>
      <path id="segLeft" class="cross-arm" fill="url(#grooveFill)"
        d="M 0.50 0.46 L 0.34 0.46 Q 0.12 0.50 0.04 0.50 Q 0.12 0.54 0.34 0.54 L 0.50 0.54 Z"/>
      <path id="segRight" class="cross-arm" fill="url(#grooveFill)"
        d="M 0.50 0.46 L 0.66 0.46 Q 0.88 0.50 0.96 0.50 Q 0.88 0.54 0.66 0.54 L 0.50 0.54 Z"/>
      <circle id="crossBoss" class="cross-arm" cx="0.5" cy="0.5" r="0.032" fill="url(#grooveFill)"/>
    </svg>

    <div id="halo"></div>
    <p id="miracleWord">The font is awake.</p>

    <div class="cover" id="cover">
      <div id="coverContent">
        <p>Allow the camera. The cross matches your frame — trace above, below, left, right. Each arm lights as you pass through it.</p>
        <button class="btn" id="startBtn">Start</button>
      </div>
    </div>

    <div class="portrait" id="portrait">
      <div class="polaroid">
        <canvas id="shot"></canvas>
        <div class="cap">Blessed &#10007;</div>
      </div>
      <button class="btn ghost again" id="againBtn">Reset</button>
    </div>
  </div>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const ZONES = {
  "1": { x:0.0,    y:0.0,    w:0.3333, h:0.3333 },
  "2": { x:0.3333, y:0.0,    w:0.3333, h:0.3333 },
  "3": { x:0.6666, y:0.0,    w:0.3334, h:0.3333 },
  "4": { x:0.0,    y:0.3333, w:0.3333, h:0.3333 },
  "8": { x:0.3333, y:0.3333, w:0.3333, h:0.3333 },
  "6": { x:0.6666, y:0.3333, w:0.3334, h:0.3333 },
  "7": { x:0.0,    y:0.6666, w:0.3333, h:0.3334 },
  "0": { x:0.3333, y:0.6666, w:0.3333, h:0.3334 },
  "5": { x:0.6666, y:0.6666, w:0.3334, h:0.3334 },
};
const SEQUENCE = ["2","0","4","6"];
const SEGMENTS = ["segHeaven","segEarth","segLeft","segRight"];
const WINDOW_MS = 6000;
const PALM = [0,5,9,17];
const ZONE_PAD = 0.05;

function zoneAt(x,y){
  for (const [name,z] of Object.entries(ZONES)){
    if (x>=z.x-ZONE_PAD && x<z.x+z.w+ZONE_PAD && y>=z.y-ZONE_PAD && y<z.y+z.h+ZONE_PAD) return name;
  }
  return null;
}

class StateMachine {
  constructor(){ this.reset(); }
  reset(){ this.step=0; this.startedAt=null; this.lastZone=null; this.state="IDLE"; }
  get expected(){ return this.step < SEQUENCE.length ? SEQUENCE[this.step] : null; }
  update(zone, now){
    if (this.state==="IN_PROGRESS" && this.startedAt!=null && now-this.startedAt>WINDOW_MS){
      this.reset();
      return { completed:false, advanced:false, reset:true };
    }
    const entered = zone!==this.lastZone ? zone : null;
    this.lastZone = zone;
    if (!entered) return { completed:false, advanced:false, reset:false };
    if (entered===this.expected){
      if (this.step===0){ this.startedAt=now; this.state="IN_PROGRESS"; }
      this.step++;
      return { completed:this.step>=SEQUENCE.length, advanced:true, reset:false };
    }
    return { completed:false, advanced:false, reset:false };
  }
}

const video = document.getElementById("video");
const cover = document.getElementById("cover");
const coverContent = document.getElementById("coverContent");
const startBtn = document.getElementById("startBtn");
const halo = document.getElementById("halo");
const haloRest = document.getElementById("haloRest");
const miracleWord = document.getElementById("miracleWord");
const portrait = document.getElementById("portrait");
const againBtn = document.getElementById("againBtn");
const shot = document.getElementById("shot");

const sm = new StateMachine();
let landmarker = null;
let running = false;
let celebrating = false;
let lastVideoTime = -1;
let detectTs = 0;

function resetCross(){
  for (const id of [...SEGMENTS, "crossBoss"]){
    const el = document.getElementById(id);
    if (!el) continue;
    el.classList.remove("lit","flash");
    el.setAttribute("fill", "url(#grooveFill)");
  }
  document.getElementById("crossAura").classList.remove("s1","s2","s3","s4");
  document.getElementById("crossAura").style.opacity = "";
}

function lightSegment(n){
  const id = SEGMENTS[n-1];
  const el = document.getElementById(id);
  if (!el) return;
  el.setAttribute("fill", "url(#goldFill)");
  el.classList.add("lit","flash");
  el.addEventListener("animationend", ()=> el.classList.remove("flash"), {once:true});
  const aura = document.getElementById("crossAura");
  aura.classList.remove("s1","s2","s3","s4");
  aura.classList.add("s"+n);
  if (n>=2){
    const boss = document.getElementById("crossBoss");
    boss.setAttribute("fill", "url(#goldFill)");
    boss.classList.add("lit");
  }
}

async function loadModel(){
  coverContent.innerHTML = '<div class="spinner"></div><p style="color:var(--mute);font-size:12px">Loading</p>';
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  landmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU",
    },
    runningMode: "VIDEO",
    numHands: 1,
    minHandDetectionConfidence: 0.4,
    minHandPresenceConfidence: 0.4,
    minTrackingConfidence: 0.35,
  });
}

async function start(){
  try {
    if (!landmarker) await loadModel();
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:"user", width:{ideal:1280}, height:{ideal:720} },
      audio: false,
    });
    video.srcObject = stream;
    await video.play();
    cover.classList.add("hidden");
    running = true;
    sm.reset();
    resetCross();
    lastVideoTime = -1;
    detectTs = 0;
    requestAnimationFrame(tick);
  } catch (e){
    cover.classList.remove("hidden");
    coverContent.innerHTML = `<p class="err">Camera blocked: ${e.message||e}</p><button class="btn" id="retryBtn">Retry</button>`;
    document.getElementById("retryBtn")?.addEventListener("click", ()=> location.reload());
  }
}

function celebrate(){
  celebrating = true;
  document.getElementById("crossAura").style.opacity = "0.65";
  document.getElementById("crossBoss").setAttribute("fill","url(#goldFill)");
  halo.classList.add("miracle");
  miracleWord.classList.add("show");
  haloRest.style.opacity = "0.15";
  const ctx = shot.getContext("2d");
  shot.width = video.videoWidth;
  shot.height = video.videoHeight;
  ctx.save();
  ctx.translate(shot.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0);
  ctx.restore();
  setTimeout(()=> portrait.classList.add("show"), 2400);
}

function resetAll(){
  portrait.classList.remove("show");
  miracleWord.classList.remove("show");
  halo.classList.remove("miracle");
  halo.style.opacity = "";
  haloRest.style.opacity = "";
  celebrating = false;
  sm.reset();
  resetCross();
  lastVideoTime = -1;
}

function tick(){
  if (!running) return;

  if (!celebrating && landmarker && video.readyState >= 2){
    if (video.currentTime !== lastVideoTime){
      lastVideoTime = video.currentTime;
      detectTs = performance.now();
      const res = landmarker.detectForVideo(video, detectTs);
      const now = performance.now();
      let result = { completed:false, advanced:false, reset:false };

      if (res.landmarks?.length){
        const lm = res.landmarks[0];
        let sx=0, sy=0;
        for (const i of PALM){ sx+=lm[i].x; sy+=lm[i].y; }
        const cx = Math.min(Math.max(1 - sx/PALM.length, 0), 1);
        const cy = Math.min(Math.max(sy/PALM.length, 0), 1);
        result = sm.update(zoneAt(cx, cy), now);
      } else {
        result = sm.update(null, now);
      }

      if (result.reset) resetCross();
      if (result.advanced) lightSegment(sm.step);
      if (result.completed) celebrate();
    }
  }
  requestAnimationFrame(tick);
}

startBtn.addEventListener("click", start);
againBtn.addEventListener("click", resetAll);
</script>
</body>
</html>
