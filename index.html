<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Gesture Ritual — Live Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:#030304; min-height:100dvh;
    display:flex; align-items:center; justify-content:center;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  #video { position:fixed; opacity:0; width:1px; height:1px; pointer-events:none; left:-9999px; }
  .stage {
    position:relative; width:min(100vw,440px); height:min(92dvh,780px);
    overflow:hidden; background:#050504;
    box-shadow:0 0 0 1px rgba(255,255,255,.05), 0 32px 80px rgba(0,0,0,.85);
  }
  .scene { width:100%; height:100%; display:block; }
  /* Camera HUD — lens overlay, not page header */
  .cam-hud {
    position:absolute; inset:0; z-index:15; pointer-events:none;
    font-family:"IBM Plex Mono",monospace; font-size:10px; letter-spacing:.14em;
    color:rgba(255,240,220,.55);
  }
  .cam-hud .rec {
    position:absolute; top:14px; left:14px;
    display:flex; align-items:center; gap:6px;
    font-weight:500; color:rgba(255,200,140,.75);
  }
  .cam-hud .rec-dot {
    width:7px; height:7px; border-radius:50%; background:#c87848;
    box-shadow:0 0 8px rgba(255,160,80,.8);
    animation:recBlink 2s ease-in-out infinite;
  }
  @keyframes recBlink { 0%,100%{opacity:1} 50%{opacity:.35} }
  .cam-hud .meta {
    position:absolute; top:14px; right:14px;
    text-align:right; line-height:1.6; font-size:9px;
    color:rgba(255,235,210,.4);
  }
  .cam-hud .frame {
    position:absolute; inset:10px;
    border:1px solid rgba(255,230,200,.08);
    box-shadow:inset 0 0 60px rgba(0,0,0,.4);
  }
  .cam-hud .corner { position:absolute; width:18px; height:18px; border-color:rgba(255,220,170,.25); border-style:solid; }
  .cam-hud .c-tl { top:10px; left:10px; border-width:1px 0 0 1px; }
  .cam-hud .c-tr { top:10px; right:10px; border-width:1px 1px 0 0; }
  .cam-hud .c-bl { bottom:10px; left:10px; border-width:0 0 1px 1px; }
  .cam-hud .c-br { bottom:10px; right:10px; border-width:0 1px 1px 0; }
  .led-bead {
    fill:rgba(255,210,150,.12);
    transition:fill .35s ease, filter .35s ease;
  }
  .led-bead.on { fill:rgba(255,235,200,.55); filter:url(#ledSoft); }
  .stage.awake .led-bead { fill:rgba(255,225,180,.35); filter:url(#ledSoft); }
  .stage.miracle .led-bead {
    fill:#fffef0;
    filter:url(#ledBright);
    animation:beadPulse 2.2s ease-in-out infinite;
  }
  .stage.miracle .led-bead:nth-child(odd) { animation-delay:.3s; }
  @keyframes beadPulse {
    0%,100% { opacity:.75; }
    50% { opacity:1; }
  }
  .led-fill {
    opacity:.15; transition:opacity .6s ease;
  }
  .stage.awake .led-fill { opacity:.35; }
  .stage.miracle .led-fill { opacity:.85; animation:ledFillPulse 4s ease-in-out forwards; }
  @keyframes ledFillPulse {
    0% { opacity:.2; } 25% { opacity:.95; } 55% { opacity:1; } 100% { opacity:.45; }
  }
  .cross-arm { opacity:.4; transition:opacity .4s, filter .4s; }
  .cross-arm.lit { opacity:1; filter:url(#crossGlow); }
  .cross-arm.flash { animation:crossFlash .55s ease-out; }
  @keyframes crossFlash {
    40% { filter:url(#crossBurst); opacity:1; }
  }
  #miracleWord {
    position:absolute; left:0; right:0; bottom:18%; z-index:16;
    text-align:center; pointer-events:none; opacity:0;
    font-family:"Cormorant Garamond",serif;
    font-size:clamp(34px,9vw,50px); font-weight:600;
    color:#faf6ec; letter-spacing:.01em;
    text-shadow:0 0 60px rgba(255,210,140,.8), 0 4px 30px rgba(0,0,0,.9);
    transition:opacity .8s ease .4s;
  }
  #miracleWord.show { opacity:1; }
  .cover {
    position:absolute; inset:0; z-index:30;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    padding:0 24px max(36px, env(safe-area-inset-bottom));
    background:linear-gradient(180deg, transparent 50%, rgba(0,0,0,.92) 100%);
    text-align:center;
  }
  .cover.hidden { display:none; }
  .cover p {
    font-family:"IBM Plex Mono",monospace; font-size:10px; letter-spacing:.06em;
    color:rgba(255,235,210,.45); max-width:280px; line-height:1.7; margin-bottom:16px;
  }
  .btn {
    font:500 10px "IBM Plex Mono",monospace; letter-spacing:.14em; text-transform:uppercase;
    background:rgba(232,200,140,.92); color:#0c0a06; border:none;
    padding:12px 28px; cursor:pointer;
  }
  .btn.ghost {
    background:transparent; color:rgba(232,200,140,.8);
    border:1px solid rgba(232,200,140,.25); padding:10px 20px;
  }
  .spinner {
    width:18px; height:18px; border:1px solid rgba(232,200,140,.2);
    border-top-color:rgba(232,200,140,.8); border-radius:50%;
    animation:spin .7s linear infinite; margin:0 auto 10px;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .portrait {
    position:absolute; inset:0; z-index:31; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.94); opacity:0; pointer-events:none; transition:opacity .5s;
  }
  .portrait.show { opacity:1; pointer-events:auto; }
  .polaroid { background:#e6e0d4; padding:6px 6px 26px; width:min(50%,170px); }
  .polaroid .cap { font-family:"Cormorant Garamond",serif; font-size:16px; text-align:center; margin-top:6px; }
  .portrait .again { position:absolute; bottom:max(20px, env(safe-area-inset-bottom)); }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <video id="video" playsinline muted></video>

    <svg class="scene" viewBox="0 0 400 720" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bgNight" cx="50%" cy="28%" r="75%">
          <stop offset="0%" stop-color="#1c1620"/><stop offset="100%" stop-color="#030303"/>
        </radialGradient>
        <linearGradient id="archGold" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f8ecc8"/><stop offset="40%" stop-color="#c89848"/>
          <stop offset="100%" stop-color="#5a4018"/>
        </linearGradient>
        <linearGradient id="plateGold" x1="20%" y1="0%" x2="80%" y2="100%">
          <stop offset="0%" stop-color="#f0dc98"/><stop offset="50%" stop-color="#a88040"/>
          <stop offset="100%" stop-color="#2a1c0a"/>
        </linearGradient>
        <linearGradient id="goldLit" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#fffff5"/><stop offset="50%" stop-color="#f0d070"/>
          <stop offset="100%" stop-color="#b87820"/>
        </linearGradient>
        <linearGradient id="crossDim" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#2a2014"/><stop offset="100%" stop-color="#0c0a06"/>
        </linearGradient>
        <radialGradient id="ledRingFill" cx="50%" cy="50%" r="50%">
          <stop offset="70%" stop-color="rgba(255,220,160,0)"/>
          <stop offset="88%" stop-color="rgba(255,210,140,.35)"/>
          <stop offset="96%" stop-color="rgba(255,235,200,.55)"/>
          <stop offset="100%" stop-color="rgba(255,200,120,0)"/>
        </radialGradient>
        <filter id="ledSoft"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="ledBright"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="crossGlow"><feGaussianBlur stdDeviation="2.5" result="b"/><feFlood flood-color="#ffe8a0" flood-opacity=".9" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="crossBurst"><feGaussianBlur stdDeviation="5" result="b"/><feFlood flood-color="#fff8e8" flood-opacity="1" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      <rect width="400" height="720" fill="url(#bgNight)"/>
      <!-- Soft backdrop behind arch (reference: white drape → warm dark silk) -->
      <ellipse cx="200" cy="360" rx="130" ry="170" fill="rgba(255,248,240,.04)"/>

      <!-- Golden arch frame (reference: chamber / niche) -->
      <path fill="none" stroke="url(#archGold)" stroke-width="10"
        d="M 55 520 L 55 280 Q 55 120 200 95 Q 345 120 345 280 L 345 520"/>
      <path fill="none" stroke="rgba(255,240,210,.12)" stroke-width="2"
        d="M 68 510 L 68 285 Q 68 135 200 112 Q 332 135 332 285 L 332 510"/>
      <!-- Solomonic twist hint on pillars -->
      <path fill="none" stroke="url(#archGold)" stroke-width="6" opacity=".5"
        d="M55 520 Q48 420 55 320 Q62 220 55 120"/>
      <path fill="none" stroke="url(#archGold)" stroke-width="6" opacity=".5"
        d="M345 520 Q352 420 345 320 Q338 220 345 120"/>

      <!-- LED halo BEHIND backplate (Riley: ring behind brass, 15–20mm float) -->
      <circle cx="200" cy="360" r="168" class="led-fill" fill="url(#ledRingFill)" filter="url(#ledSoft)"/>
      <g id="ledBeads"></g>

      <!-- Brass backplate — centred in arch / lens -->
      <circle cx="200" cy="360" r="8" fill="#080604"/>
      <circle cx="200" cy="360" r="132" fill="url(#plateGold)" stroke="rgba(255,235,200,.12)" stroke-width="2"/>
      <ellipse cx="168" cy="328" rx="48" ry="34" fill="rgba(255,250,235,.12)" transform="rotate(-15 168 328)"/>

      <!-- Clip cross to plate so it never looks cut by the arch -->
      <clipPath id="plateClip">
        <circle cx="200" cy="360" r="125"/>
      </clipPath>

      <!-- Ornate cross — trefoil terminals, centred on plate (200,360) -->
      <g id="ritualCross" clip-path="url(#plateClip)" transform="translate(0,20) scale(0.92)">
        <g fill="url(#crossDim)" opacity=".7">
          <!-- groove silhouette -->
          <path d="M192 340 L192 248 Q192 218 200 208 Q208 218 208 248 L208 340
                   M192 340 L192 428 Q192 458 200 468 Q208 458 208 428 L208 340
                   M340 332 L208 332 L208 348 L340 348 Q358 340 368 340 Q358 348 340 348 L340 332
                   M192 332 L60 332 L60 348 L192 348 L192 332 L60 348 Q42 340 32 340 Q42 332 60 332 L192 332 Z"/>
        </g>
        <!-- Heaven — trefoil top -->
        <path id="segHeaven" class="cross-arm" fill="url(#crossDim)"
          d="M193 340 L193 252 Q193 222 200 210 Q207 222 207 252 L207 340
             M196 340 L196 258 Q196 232 200 222 Q204 232 204 258 L204 340
             M200 210 Q188 200 182 195 Q188 205 200 215 Q212 205 218 195 Q212 200 200 210 Z"/>
        <!-- Earth — trefoil bottom + bowl zone -->
        <path id="segEarth" class="cross-arm" fill="url(#crossDim)"
          d="M193 340 L193 420 Q193 450 200 462 Q207 450 207 420 L207 340
             M196 340 L196 414 Q196 440 200 452 Q204 440 204 414 L204 340
             M200 462 Q188 472 182 477 Q188 467 200 457 Q212 467 218 477 Q212 472 200 462 Z"/>
        <!-- Left trefoil -->
        <path id="segLeft" class="cross-arm" fill="url(#crossDim)"
          d="M200 333 L108 333 Q78 340 68 340 Q78 347 108 347 L200 347
             M200 336 L115 336 Q88 340 78 340 Q88 344 115 344 L200 344
             M68 340 Q58 328 52 322 Q62 332 68 340 Q62 348 52 358 Q58 352 68 340 Z"/>
        <!-- Right trefoil -->
        <path id="segRight" class="cross-arm" fill="url(#crossDim)"
          d="M200 333 L292 333 Q322 340 332 340 Q322 347 292 347 L200 347
             M200 336 L285 336 Q312 340 322 340 Q312 344 285 344 L200 344
             M332 340 Q342 328 348 322 Q338 332 332 340 Q338 348 348 358 Q342 352 332 340 Z"/>
        <circle id="crossBoss" class="cross-arm" cx="200" cy="340" r="13" fill="url(#crossDim)" stroke="rgba(0,0,0,.25)" stroke-width="1"/>
        <circle cx="200" cy="340" r="7" fill="none" stroke="rgba(255,230,190,.1)" stroke-width=".8"/>
      </g>

      <!-- Bowl — integrated below cross centre -->
      <ellipse cx="200" cy="410" rx="58" ry="36" fill="#0a0806"/>
      <ellipse cx="200" cy="404" rx="46" ry="28" fill="#1a140c" stroke="rgba(255,230,200,.06)" stroke-width="1"/>
    </svg>

    <div class="cam-hud">
      <div class="frame"></div>
      <span class="corner c-tl"></span><span class="corner c-tr"></span>
      <span class="corner c-bl"></span><span class="corner c-br"></span>
      <div class="rec"><span class="rec-dot"></span> REC</div>
      <div class="meta">FONT CAM 01<br/>PINHOLE · 6mm<br/>720 × 1280</div>
    </div>

    <p id="miracleWord">The font is awake.</p>

    <div class="cover" id="cover">
      <div id="coverContent">
        <p>Fixed lens view. Trace the sign — cross and LED ring respond. You are not on camera.</p>
        <button class="btn" id="startBtn">Arm system</button>
      </div>
    </div>

    <div class="portrait" id="portrait">
      <div class="polaroid"><canvas id="shot"></canvas><div class="cap">Blessed &#10007;</div></div>
      <button class="btn ghost again" id="againBtn">Reset</button>
    </div>
  </div>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const ZONES = { "2":{x:.3333,y:0,w:.3333,h:.3333}, "0":{x:.3333,y:.6666,w:.3333,h:.3334}, "4":{x:0,y:.3333,w:.3333,h:.3333}, "6":{x:.6666,y:.3333,w:.3334,h:.3333} };
const SEQUENCE = ["2","0","4","6"];
const SEGMENTS = ["segHeaven","segEarth","segLeft","segRight"];
const WINDOW_MS = 7500;
const PALM = [0,5,9,17];
const PAD = .08;

function zoneAt(x,y){
  for (const [n,z] of Object.entries(ZONES))
    if (x>=z.x-PAD && x<z.x+z.w+PAD && y>=z.y-PAD && y<z.y+z.h+PAD) return n;
  return null;
}

class SM {
  reset(){ this.step=0; this.t0=null; this.lz=null; this.st="IDLE"; }
  constructor(){ this.reset(); }
  get exp(){ return this.step<4 ? SEQUENCE[this.step] : null; }
  upd(z,now){
    if (this.st==="IN_PROGRESS" && this.t0 && now-this.t0>WINDOW_MS){ this.reset(); return {d:0,a:0,r:1}; }
    const e = z!==this.lz ? z : null; this.lz=z;
    if (!e) return {d:0,a:0,r:0};
    if (e===this.exp){ if(!this.step){this.t0=now;this.st="IN_PROGRESS";} this.step++; return {d:this.step>=4,a:1,r:0}; }
    return {d:0,a:0,r:0};
  }
}

// LED beads around ring — matches brass diameter
const beads = document.getElementById("ledBeads");
const CX=200, CY=360, R=162, N=36;
for (let i=0;i<N;i++){
  const a = (i/N)*Math.PI*2 - Math.PI/2;
  const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
  c.setAttribute("class","led-bead");
  c.setAttribute("cx", CX + R*Math.cos(a));
  c.setAttribute("cy", CY + R*Math.sin(a));
  c.setAttribute("r", i%3===0 ? 3.2 : 2.2);
  beads.appendChild(c);
}

const stage = document.getElementById("stage");
const video = document.getElementById("video");
const cover = document.getElementById("cover");
const coverContent = document.getElementById("coverContent");
const miracleWord = document.getElementById("miracleWord");
const sm = new SM();
let lm, run=false, celeb=false, lvt=-1;

function resetVis(){
  SEGMENTS.forEach(id=>{
    const el=document.getElementById(id);
    el.classList.remove("lit","flash");
    el.setAttribute("fill","url(#crossDim)");
  });
  document.getElementById("crossBoss").setAttribute("fill","url(#crossDim)");
  document.getElementById("crossBoss").classList.remove("lit");
  stage.classList.remove("miracle");
  stage.classList.add("awake");
  document.querySelectorAll(".led-bead").forEach(b=>b.classList.remove("on"));
}

function lightStep(n){
  const el=document.getElementById(SEGMENTS[n-1]);
  el.setAttribute("fill","url(#goldLit)");
  el.classList.add("lit","flash");
  el.addEventListener("animationend",()=>el.classList.remove("flash"),{once:true});
  if(n>=2){
    const b=document.getElementById("crossBoss");
    b.setAttribute("fill","url(#goldLit)"); b.classList.add("lit");
  }
  document.querySelectorAll(".led-bead").forEach((b,i)=>{ if(i<n*9) b.classList.add("on"); });
}

async function loadModel(){
  coverContent.innerHTML='<div class="spinner"></div>';
  const v=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  lm=await HandLandmarker.createFromOptions(v,{
    baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",delegate:"GPU"},
    runningMode:"VIDEO",numHands:1,minHandDetectionConfidence:.35,minHandPresenceConfidence:.35,minTrackingConfidence:.3,
  });
}

async function start(){
  try{
    if(!lm) await loadModel();
    video.srcObject=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:{ideal:1280},height:{ideal:720}},audio:false});
    await video.play();
    cover.classList.add("hidden");
    run=true; sm.reset(); resetVis(); stage.classList.add("awake");
    lvt=-1; requestAnimationFrame(tick);
  }catch(e){
    coverContent.innerHTML=`<p style="color:#b89090;font-size:10px">${e.message}</p><button class="btn" id="r">Retry</button>`;
    document.getElementById("r")?.addEventListener("click",()=>location.reload());
  }
}

function celebrate(){
  celeb=true;
  [...SEGMENTS,"crossBoss"].forEach(id=>{
    const el=document.getElementById(id);
    el.setAttribute("fill","url(#goldLit)"); el.classList.add("lit");
  });
  stage.classList.remove("awake");
  stage.classList.add("miracle");
  document.querySelectorAll(".led-bead").forEach(b=>b.classList.add("on"));
  miracleWord.classList.add("show");
  setTimeout(()=>document.getElementById("portrait").classList.add("show"),2800);
}

function resetAll(){
  document.getElementById("portrait").classList.remove("show");
  miracleWord.classList.remove("show");
  celeb=false; sm.reset(); resetVis(); lvt=-1;
}

function tick(){
  if(!run) return;
  if(!celeb && lm && video.readyState>=2 && video.currentTime!==lvt){
    lvt=video.currentTime;
    const res=lm.detectForVideo(video,performance.now());
    const now=performance.now();
    let r={d:0,a:0,r:0};
    if(res.landmarks?.length){
      const L=res.landmarks[0]; let sx=0,sy=0;
      for(const i of PALM){sx+=L[i].x;sy+=L[i].y;}
      r=sm.upd(zoneAt(Math.min(Math.max(1-sx/4,0),1),Math.min(Math.max(sy/4,0),1)),now);
    } else r=sm.upd(null,now);
    if(r.r) resetVis();
    if(r.a) lightStep(sm.step);
    if(r.d) celebrate();
  }
  requestAnimationFrame(tick);
}

document.getElementById("startBtn").addEventListener("click",start);
document.getElementById("againBtn").addEventListener("click",resetAll);
</script>
</body>
</html>
