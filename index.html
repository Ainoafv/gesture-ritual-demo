<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Gesture Ritual — Live Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#060508; --ink:#ebe3d4; --mute:#8a8278;
    --brass:#c4a062; --brass-light:#e8d5a8; --line:rgba(196,160,98,.2);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:Inter,system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink); min-height:100dvh;
    display:flex; flex-direction:column; align-items:center;
    padding:max(20px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
  }
  .header { text-align:center; max-width:440px; }
  h1 {
    font-family:"Cormorant Garamond",Georgia,serif; font-weight:600;
    font-size:clamp(28px,5vw,36px); letter-spacing:-.01em; line-height:1.15;
  }
  .tag {
    color:var(--mute); font-size:13px; margin-top:8px; line-height:1.5; font-weight:400;
  }
  .stage {
    position:relative; flex:1; width:min(94vw, 460px);
    min-height:min(66dvh, 620px); max-height:74dvh;
    margin-top:18px; overflow:hidden;
    background:#040404;
    border:1px solid rgba(255,255,255,.04);
    box-shadow:0 40px 100px rgba(0,0,0,.75);
  }
  #video {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; transform:scaleX(-1);
    opacity:0; pointer-events:none; z-index:0;
  }
  .scene {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse 65% 50% at 50% 44%, #181410 0%, #060505 100%);
  }
  .font-svg {
    width:80%; max-height:74%; position:relative; z-index:2;
    filter:drop-shadow(0 20px 40px rgba(0,0,0,.6));
  }
  .cross-seg {
    fill:none; stroke:rgba(255,235,200,.1); stroke-width:2; stroke-linecap:round;
    transition:stroke .4s ease, stroke-width .4s ease, opacity .4s ease;
  }
  .cross-seg.lit {
    stroke:rgba(255,242,215,.92); stroke-width:2.6;
    filter:drop-shadow(0 0 8px rgba(255,210,140,.65));
  }
  .cross-seg.flash { animation:crossFlash .55s ease-out; }
  @keyframes crossFlash {
    0% { stroke-width:2.6; filter:drop-shadow(0 0 4px rgba(255,210,140,.4)); }
    40% { stroke-width:3.4; filter:drop-shadow(0 0 14px rgba(255,230,180,.95)); }
    100% { stroke-width:2.6; filter:drop-shadow(0 0 8px rgba(255,210,140,.65)); }
  }
  .vignette {
    position:absolute; inset:0; pointer-events:none; z-index:5;
    background:radial-gradient(ellipse 75% 65% at 50% 46%, transparent 35%, rgba(0,0,0,.55) 100%);
  }
  #haloRest {
    position:absolute; left:50%; top:43%; width:88%; max-width:400px; aspect-ratio:1;
    transform:translate(-50%,-50%); border-radius:50%; pointer-events:none; z-index:1;
    background:radial-gradient(circle, rgba(255,220,160,.4) 0%, rgba(220,170,100,.12) 45%, transparent 68%);
    filter:blur(18px); opacity:.42;
    animation:restBreath 6s ease-in-out infinite;
  }
  @keyframes restBreath {
    0%, 100% { opacity:.36; transform:translate(-50%,-50%) scale(.98); }
    50% { opacity:.48; transform:translate(-50%,-50%) scale(1.01); }
  }
  #halo {
    position:absolute; left:50%; top:43%; width:92%; max-width:420px; aspect-ratio:1;
    transform:translate(-50%,-50%) scale(.45); border-radius:50%; pointer-events:none; z-index:4;
    opacity:0;
    background:radial-gradient(circle, rgba(255,248,235,1) 0%, rgba(255,215,150,.7) 30%, transparent 62%);
    filter:blur(10px);
  }
  #halo.miracle { animation:miracleHalo 4.2s ease-in-out forwards; }
  @keyframes miracleHalo {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(.5); }
    30%  { opacity:1; transform:translate(-50%,-50%) scale(1.12); }
    55%  { opacity:1; transform:translate(-50%,-50%) scale(1.14); }
    100% { opacity:.3; transform:translate(-50%,-50%) scale(.9); }
  }
  #miracleWord {
    position:absolute; left:0; right:0; top:10%; text-align:center;
    pointer-events:none; z-index:6; opacity:0;
    font-family:"Cormorant Garamond",Georgia,serif;
    font-size:clamp(32px,8vw,52px); font-weight:600; letter-spacing:-.01em;
    color:#f5eedf;
    text-shadow:0 0 48px rgba(255,210,140,.5);
    transition:opacity .7s ease .35s;
  }
  #miracleWord.show { opacity:1; }
  .cover {
    position:absolute; inset:0; z-index:10; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end; padding:0 24px max(40px, env(safe-area-inset-bottom));
    background:linear-gradient(180deg, transparent 40%, rgba(4,3,5,.92) 100%);
    text-align:center;
  }
  .cover.hidden { display:none; }
  .cover p { color:var(--mute); font-size:13px; max-width:340px; line-height:1.65; margin-bottom:18px; }
  .btn {
    font:500 12px Inter,sans-serif; letter-spacing:.08em; text-transform:uppercase;
    color:#141008; background:var(--brass-light);
    border:none; padding:13px 32px; cursor:pointer;
  }
  .btn.ghost {
    background:transparent; color:var(--brass-light); border:1px solid var(--line);
    font-size:11px; padding:11px 24px;
  }
  .spinner {
    width:24px; height:24px; border:2px solid var(--line); border-top-color:var(--brass);
    border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 10px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .portrait {
    position:absolute; inset:0; z-index:11; display:flex; align-items:center; justify-content:center;
    background:rgba(2,2,3,.9); opacity:0; pointer-events:none; transition:opacity .6s ease;
  }
  .portrait.show { opacity:1; pointer-events:auto; }
  .polaroid {
    background:#eee8dc; padding:8px 8px 32px; width:min(62%,220px);
    box-shadow:0 16px 48px rgba(0,0,0,.65);
    transform:translateY(12px); transition:transform .55s ease;
  }
  .portrait.show .polaroid { transform:translateY(0); }
  .polaroid canvas { width:100%; display:block; }
  .polaroid .cap {
    font-family:"Cormorant Garamond",serif; font-size:17px; font-weight:500;
    text-align:center; margin-top:8px; color:#2a2418;
  }
  .portrait .again { position:absolute; bottom:max(24px, env(safe-area-inset-bottom)); }
  .err { color:#b89090; font-size:13px; }
</style>
</head>
<body>
  <header class="header">
    <h1>Sign of the Cross</h1>
    <p class="tag">Gesture recognition prototype · on-device · camera required</p>
  </header>

  <div class="stage">
    <video id="video" playsinline muted></video>

    <div class="scene">
      <div id="haloRest"></div>
      <svg class="font-svg" viewBox="0 0 400 480" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <radialGradient id="wallG" cx="50%" cy="42%" r="55%">
            <stop offset="0%" stop-color="#1e1814"/><stop offset="100%" stop-color="#080605"/>
          </radialGradient>
          <radialGradient id="rimHalo" cx="50%" cy="48%" r="50%">
            <stop offset="74%" stop-color="rgba(255,210,140,0)"/>
            <stop offset="90%" stop-color="rgba(255,200,120,.14)"/>
            <stop offset="100%" stop-color="rgba(255,200,100,0)"/>
          </radialGradient>
          <linearGradient id="brassMain" x1="28%" y1="12%" x2="72%" y2="88%">
            <stop offset="0%" stop-color="#e8d098"/>
            <stop offset="30%" stop-color="#b89050"/>
            <stop offset="100%" stop-color="#3a2c18"/>
          </linearGradient>
          <linearGradient id="brassEdge" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fff2d8" stop-opacity=".45"/>
            <stop offset="100%" stop-color="#5a4020" stop-opacity=".35"/>
          </linearGradient>
          <radialGradient id="bowlIn" cx="50%" cy="55%" r="45%">
            <stop offset="0%" stop-color="#181008"/>
            <stop offset="100%" stop-color="#5c4528"/>
          </radialGradient>
          <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity=".5"/>
          </filter>
        </defs>
        <rect width="400" height="480" fill="url(#wallG)"/>
        <ellipse cx="200" cy="230" rx="165" ry="165" fill="url(#rimHalo)"/>
        <ellipse cx="200" cy="232" rx="152" ry="152" fill="none" stroke="rgba(0,0,0,.3)" stroke-width="5"/>
        <circle cx="200" cy="228" r="136" fill="url(#brassMain)" filter="url(#softShadow)"/>
        <circle cx="200" cy="228" r="136" fill="none" stroke="url(#brassEdge)" stroke-width="2" opacity=".65"/>
        <ellipse cx="165" cy="190" rx="48" ry="34" fill="rgba(255,245,220,.18)" transform="rotate(-22 165 190)"/>
        <ellipse cx="200" cy="268" rx="70" ry="46" fill="url(#bowlIn)"/>
        <ellipse cx="200" cy="262" rx="56" ry="34" fill="none" stroke="rgba(255,230,190,.1)" stroke-width="1.2"/>
        <path d="M130 250 Q112 258 114 274 Q120 266 130 260 Z" fill="#5a4428" opacity=".9"/>
        <!-- Ritual cross — four segments light in sequence -->
        <g id="ritualCross">
          <line id="segHeaven" class="cross-seg" x1="200" y1="192" x2="200" y2="248"/>
          <line id="segEarth"  class="cross-seg" x1="200" y1="248" x2="200" y2="308"/>
          <line id="segLeft"   class="cross-seg" x1="156" y1="248" x2="200" y2="248"/>
          <line id="segRight"  class="cross-seg" x1="200" y1="248" x2="244" y2="248"/>
        </g>
      </svg>
      <div id="halo"></div>
    </div>

    <div class="vignette"></div>
    <p id="miracleWord">The font is awake.</p>

    <div class="cover" id="cover">
      <div id="coverContent">
        <p>Allow camera access. Trace the sign in front of you — the cross on the brass completes as each movement registers.</p>
        <button class="btn" id="startBtn">Start</button>
      </div>
    </div>

    <div class="portrait" id="portrait">
      <div class="polaroid">
        <canvas id="shot"></canvas>
        <div class="cap">Blessed &#10007;</div>
      </div>
      <button class="btn ghost again" id="againBtn">Reset</button>
    </div>
  </div>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const ZONES = {
  "1": { x:0.0,    y:0.0,    w:0.3333, h:0.3333 },
  "2": { x:0.3333, y:0.0,    w:0.3333, h:0.3333 },
  "3": { x:0.6666, y:0.0,    w:0.3334, h:0.3333 },
  "4": { x:0.0,    y:0.3333, w:0.3333, h:0.3333 },
  "8": { x:0.3333, y:0.3333, w:0.3333, h:0.3333 },
  "6": { x:0.6666, y:0.3333, w:0.3334, h:0.3333 },
  "7": { x:0.0,    y:0.6666, w:0.3333, h:0.3334 },
  "0": { x:0.3333, y:0.6666, w:0.3333, h:0.3334 },
  "5": { x:0.6666, y:0.6666, w:0.3334, h:0.3334 },
};
const SEQUENCE = ["2","0","4","6"];
const SEGMENTS = ["segHeaven","segEarth","segLeft","segRight"];
const WINDOW_MS = 5500;
const PALM = [0,5,9,17];
const ZONE_PAD = 0.06;

function zoneAt(x,y){
  for (const [name,z] of Object.entries(ZONES)){
    if (x>=z.x-ZONE_PAD && x<z.x+z.w+ZONE_PAD && y>=z.y-ZONE_PAD && y<z.y+z.h+ZONE_PAD) return name;
  }
  return null;
}

class StateMachine {
  constructor(){ this.reset(); }
  reset(){ this.step=0; this.startedAt=null; this.lastZone=null; this.state="IDLE"; }
  get expected(){ return this.step < SEQUENCE.length ? SEQUENCE[this.step] : null; }
  update(zone, now){
    if (this.state==="IN_PROGRESS" && this.startedAt!==null && now-this.startedAt>WINDOW_MS){
      this.reset();
      return { completed:false, advanced:false, reset:true };
    }
    const entered = zone!==this.lastZone ? zone : null;
    this.lastZone = zone;
    if (entered===null) return { completed:false, advanced:false, reset:false };
    if (entered===this.expected){
      if (this.step===0){ this.startedAt=now; this.state="IN_PROGRESS"; }
      this.step++;
      const completed = this.step >= SEQUENCE.length;
      if (completed) this.state="COMPLETE";
      return { completed, advanced:true, reset:false };
    }
    return { completed:false, advanced:false, reset:false };
  }
}

const video = document.getElementById("video");
const cover = document.getElementById("cover");
const coverContent = document.getElementById("coverContent");
const startBtn = document.getElementById("startBtn");
const halo = document.getElementById("halo");
const haloRest = document.getElementById("haloRest");
const miracleWord = document.getElementById("miracleWord");
const portrait = document.getElementById("portrait");
const againBtn = document.getElementById("againBtn");
const shot = document.getElementById("shot");

const sm = new StateMachine();
let landmarker = null;
let running = false;
let celebrating = false;
let lastVideoTime = -1;

function resetCross(){
  for (const id of SEGMENTS){
    const el = document.getElementById(id);
    el.classList.remove("lit","flash");
  }
}

function lightSegment(stepIndex){
  const id = SEGMENTS[stepIndex - 1];
  if (!id) return;
  const el = document.getElementById(id);
  el.classList.add("lit","flash");
  el.addEventListener("animationend", ()=> el.classList.remove("flash"), { once:true });
}

async function loadModel(){
  coverContent.innerHTML = '<div class="spinner"></div><p style="color:var(--mute);font-size:13px">Loading model</p>';
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  landmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU",
    },
    runningMode: "VIDEO",
    numHands: 1,
    minHandDetectionConfidence: 0.45,
    minHandPresenceConfidence: 0.45,
    minTrackingConfidence: 0.4,
  });
}

async function start(){
  try {
    if (!landmarker) await loadModel();
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"user", width:{ideal:1280}, height:{ideal:960} }, audio:false
    });
    video.srcObject = stream;
    await video.play();
    cover.classList.add("hidden");
    running = true;
    sm.reset();
    resetCross();
    requestAnimationFrame(loop);
  } catch (e){
    cover.classList.remove("hidden");
    coverContent.innerHTML = '<p class="err">Camera unavailable.</p><button class="btn" id="retryBtn">Retry</button>';
    document.getElementById("retryBtn")?.addEventListener("click", () => location.reload());
  }
}

function celebrate(){
  celebrating = true;
  haloRest.style.transition = "opacity 1s ease";
  haloRest.style.opacity = "0.2";
  halo.classList.add("miracle");
  miracleWord.classList.add("show");
  const sctx = shot.getContext("2d");
  shot.width = video.videoWidth; shot.height = video.videoHeight;
  sctx.translate(shot.width,0); sctx.scale(-1,1);
  sctx.drawImage(video,0,0,shot.width,shot.height);
  setTimeout(()=> portrait.classList.add("show"), 2600);
}

function resetAll(){
  portrait.classList.remove("show");
  miracleWord.classList.remove("show");
  halo.classList.remove("miracle");
  halo.style.opacity = "0";
  haloRest.style.opacity = "";
  haloRest.style.transition = "";
  const sctx = shot.getContext("2d");
  sctx.setTransform(1,0,0,1,0,0);
  sctx.clearRect(0,0,shot.width,shot.height);
  celebrating = false;
  sm.reset();
  resetCross();
}

function loop(){
  if (!running) return;

  if (!celebrating && landmarker && video.readyState >= 2
      && video.currentTime !== lastVideoTime){
    lastVideoTime = video.currentTime;
    const res = landmarker.detectForVideo(video, performance.now());
    const now = performance.now();
    if (res.landmarks?.length){
      const lm = res.landmarks[0];
      let sx=0, sy=0;
      for (const i of PALM){ sx+=lm[i].x; sy+=lm[i].y; }
      const cx = Math.min(Math.max(1-(sx/PALM.length),0),1);
      const cy = Math.min(Math.max(sy/PALM.length,0),1);
      const result = sm.update(zoneAt(cx,cy), now);
      if (result.reset) resetCross();
      if (result.advanced) lightSegment(sm.step);
      if (result.completed) celebrate();
    } else {
      const result = sm.update(null, now);
      if (result.reset) resetCross();
    }
  }
  requestAnimationFrame(loop);
}

startBtn.addEventListener("click", start);
againBtn.addEventListener("click", resetAll);
</script>
</body>
</html>
